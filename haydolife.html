<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HaydoLife</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Anton&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--surface:#13131f;--card:#1a1a2a;--border:#252535;
  --purple:#9147ff;--green:#2dc653;--red:#e63946;--gold:#f4b942;
  --blue:#3b82f6;--text:#efeff1;--muted:#8888a0;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  min-height:100vh;overflow-x:hidden}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  z-index:1000;
}
#intro-logo{font-family:'Anton',sans-serif;font-size:4rem;color:var(--purple);
  letter-spacing:3px;text-shadow:0 0 40px rgba(145,71,255,.6)}
#intro-sub{font-size:.9rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
#intro-btn{background:var(--purple);color:#fff;border:none;border-radius:8px;
  padding:16px 48px;font-size:1.1rem;font-weight:900;cursor:pointer;
  font-family:inherit;letter-spacing:1px;transition:all .2s}
#intro-btn:hover{background:#772ce8;transform:translateY(-2px)}
#save-info{font-size:.72rem;color:var(--muted);margin-top:-8px}

/* ── MAIN LAYOUT ── */
#game{display:none;flex-direction:column;min-height:100vh}

/* TOP STATS BAR */
#stats-bar{
  background:rgba(0,0,0,.85);border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;
  backdrop-filter:blur(8px);position:sticky;top:0;z-index:100;
}
.stat{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700}
.stat-icon{font-size:1rem}
.stat-val{color:#fff;font-weight:900}
.stat-lbl{color:var(--muted);font-size:.65rem}
#energy-bar-wrap{flex:1;max-width:120px;height:8px;background:rgba(255,255,255,.1);
  border-radius:4px;overflow:hidden}
#energy-bar{height:100%;background:var(--green);border-radius:4px;transition:width .5s ease}
#day-badge{margin-left:auto;font-size:.7rem;font-weight:800;color:var(--muted);
  background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px 8px}
#time-display{font-size:.78rem;font-weight:800;color:var(--purple)}

/* ── ROOM ── */
#room-wrap{
  position:relative;width:100%;
  background:#000;overflow:hidden;
  /* 16:9 aspect ratio */
  aspect-ratio:16/9;max-height:60vh;
}
#room-bg{width:100%;height:100%;object-fit:cover;object-position:center}
#haydo-sprite{
  position:absolute;bottom:8%;
  width:14%;
  transition:left 1.2s cubic-bezier(.4,0,.2,1), bottom .4s ease;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));
  z-index:10;
}
/* Position presets (left % of room) */
/* chair: 12%, bed: 5%, center: 40%, fridge-area: 70% (right side near shelf) */

/* Sleeping overlay */
#sleep-overlay{
  position:absolute;inset:0;background:rgba(10,5,20,.75);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;
  z-index:20;
}
#sleep-zzz{font-size:3rem;animation:zzz 2s ease-in-out infinite}
@keyframes zzz{0%,100%{transform:translateY(0) scale(1);opacity:.6}50%{transform:translateY(-12px) scale(1.1);opacity:1}}
#sleep-label{font-family:'Anton',sans-serif;font-size:1.4rem;color:#fff;letter-spacing:2px}

/* Streaming indicator */
#live-badge{
  position:absolute;top:10px;left:10px;
  background:var(--red);color:#fff;font-size:.65rem;font-weight:900;
  padding:4px 8px;border-radius:4px;letter-spacing:1px;
  display:none;animation:livePulse 2s ease-in-out infinite;z-index:15;
}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
#viewer-bubble{
  position:absolute;top:10px;left:60px;
  background:rgba(0,0,0,.8);color:#fff;font-size:.72rem;font-weight:800;
  padding:4px 10px;border-radius:4px;display:none;z-index:15;
  border:1px solid rgba(255,255,255,.1);
}

/* ── BOTTOM PANEL ── */
#bottom{display:flex;gap:12px;padding:12px 16px;flex:1;min-height:0;overflow:hidden}

/* Action buttons */
#actions-panel{
  width:200px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:6px;
}
#actions-title{font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:4px}
.action-btn{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:9px 12px;font-size:.76rem;font-weight:700;cursor:pointer;
  font-family:inherit;color:var(--text);text-align:left;transition:all .18s;
  display:flex;align-items:center;gap:8px;
}
.action-btn:hover:not(:disabled){background:rgba(145,71,255,.15);border-color:var(--purple);color:#fff}
.action-btn:disabled{opacity:.35;cursor:not-allowed}
.action-btn.active{background:rgba(145,71,255,.2);border-color:var(--purple);color:var(--purple)}
.action-btn .aicon{font-size:1rem;flex-shrink:0}

/* Social media panel */
#social-panel{
  width:160px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;
}
#social-title{font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.social-stat{display:flex;flex-direction:column;gap:2px;padding:8px;background:var(--card);
  border-radius:6px;border:1px solid var(--border)}
.social-platform{font-size:.62rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.social-count{font-size:1.1rem;font-weight:900;color:#fff}
.social-trend{font-size:.62rem;font-weight:700}
.social-trend.up{color:var(--green)}
.social-trend.down{color:var(--red)}

/* Event log */
#event-log{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;
}
#event-title{font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:4px;flex-shrink:0}
.event-item{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;font-size:.76rem;line-height:1.4;flex-shrink:0;
}
.event-item.good{border-color:rgba(45,198,83,.4);background:rgba(45,198,83,.08)}
.event-item.bad{border-color:rgba(230,57,70,.4);background:rgba(230,57,70,.08)}
.event-item.neutral{border-color:rgba(145,71,255,.3);background:rgba(145,71,255,.06)}
.event-item .ev-icon{margin-right:4px}

/* ── DECISION POPUP ── */
#decision-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:500;
  backdrop-filter:blur(4px);padding:16px;
}
#decision-box{
  background:var(--surface);border:2px solid var(--purple);border-radius:12px;
  padding:24px;max-width:480px;width:100%;display:flex;flex-direction:column;gap:14px;
  box-shadow:0 0 60px rgba(145,71,255,.3);
}
#dec-context{font-size:.68rem;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:2px}
#dec-question{font-size:1.05rem;font-weight:900;line-height:1.4;color:#fff}
#dec-options{display:flex;flex-direction:column;gap:8px}
.dec-opt{
  background:var(--card);border:2px solid var(--border);border-radius:8px;
  padding:12px 16px;cursor:pointer;font-size:.85rem;font-weight:700;
  font-family:inherit;color:var(--text);text-align:left;transition:all .18s;
}
.dec-opt:hover{border-color:var(--purple);background:rgba(145,71,255,.15);color:#fff}
.dec-opt .opt-letter{color:var(--purple);font-weight:900;margin-right:8px}

/* ── NOTIFICATION TOAST ── */
#notif{
  position:fixed;bottom:20px;right:20px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;font-size:.8rem;font-weight:700;z-index:999;
  transform:translateX(120%);transition:transform .3s;max-width:280px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#notif.show{transform:translateX(0)}
#notif.good{border-color:var(--green);color:var(--green)}
#notif.bad{border-color:var(--red);color:var(--red)}
#notif.milestone{border-color:var(--gold);color:var(--gold);font-size:.9rem}

/* ── MILESTONE POPUP ── */
#milestone-pop{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--surface);border:3px solid var(--gold);border-radius:14px;
  padding:28px 40px;text-align:center;z-index:600;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
}
#milestone-pop.show{transform:translate(-50%,-50%) scale(1)}
#ms-icon{font-size:3rem;line-height:1}
#ms-title{font-family:'Anton',sans-serif;font-size:1.8rem;color:var(--gold);letter-spacing:2px;margin-top:8px}
#ms-sub{font-size:.82rem;color:var(--muted);margin-top:4px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

// ══════════════════════════════════════════════════════════════════
//  SAVE / LOAD
// ══════════════════════════════════════════════════════════════════
function saveState(){
  const save = {...S, milestonesHit: [...S.milestonesHit]};
  localStorage.setItem('haydolife-save', JSON.stringify(save));
}

function loadState(){
  try{
    const raw = localStorage.getItem('haydolife-save');
    if(!raw) return {...DEFAULT_STATE, milestonesHit: new Set()};
    const parsed = JSON.parse(raw);
    parsed.milestonesHit = new Set(parsed.milestonesHit||[]);
    return parsed;
  }catch(e){ return {...DEFAULT_STATE, milestonesHit: new Set()}; }
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
function startGame(){
  document.getElementById('intro').style.display='none';
  document.getElementById('game').style.display='flex';
  try{ updateUI(); }catch(e){}
  startTick();
  logEvent('🎮 Day '+S.day+' — Haydo boots up the PC and gets ready to go live.','neutral');
  if(S.day > 1) logEvent('💾 Progress loaded from last session.','neutral');
}

// ══════════════════════════════════════════════════════════════════
//  GAME TICK (simulated time)
// ══════════════════════════════════════════════════════════════════
function startTick(){
  gameTickInterval = setInterval(()=>{
    if(S.isSleeping) return;
    // Advance time every 8 seconds = 1 in-game hour
    S.hour++;
    if(S.hour >= 24){ S.hour=0; S.day++; S.consecutiveDaysStreamed++; }

    // Passive viewer decay if not live
    if(!S.isLive && S.viewers > 0){
      S.viewers = Math.max(0, S.viewers - Math.ceil(S.viewers * 0.05));
    }

    // While live: passive small viewer drift
    if(S.isLive){
      S.streamHours++;
      // Small random viewer change
      const drift = Math.floor(Math.random()*6)-2;
      S.viewers = Math.max(0, S.viewers + drift);
      // Energy drain from streaming
      S.energy = Math.max(0, S.energy - 2);
      if(S.energy <= 0){ autoEndStream(); }

      // Random event chance (every ~4 ticks = 4 game hours)
      if(S.streamHours % 4 === 0 && Math.random() < 0.7){
        const pool = DECISIONS.filter(d=>d.trigger==='random');
        const rand = RANDOM_EVENTS;
        const all = [...pool, ...rand];
        const pick = all[Math.floor(Math.random()*all.length)];
        queueDecision(pick);
      }
    }

    updateUI();
    saveState();
    checkMilestones();
  }, 8000);
}

function autoEndStream(){
  S.isLive = false;
  S.streamHours = 0;
  S.viewers = Math.max(0, Math.floor(S.viewers * 0.3));
  logEvent('😴 Haydo passed out from exhaustion mid-stream. Viewers dropped hard.','bad');
  moveHaydo('bed');
  showNotif('Passed out from exhaustion!','bad');
  updateButtons();
  updateUI();
}

// ══════════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════════
function doAction(action){
  if(S.isSleeping) return;

  // Find matching decision
  const pool = DECISIONS.filter(d=>d.trigger===action);
  if(pool.length > 0){
    const pick = pool[Math.floor(Math.random()*pool.length)];
    queueDecision(pick, action);
  } else {
    // Immediate action
    executeImmediateAction(action);
  }
}

function executeImmediateAction(action){
  switch(action){
    case 'stream':
      S.isLive = true;
      S.streamHours = 0;
      S.totalStreams++;
      S.viewers = Math.max(1, S.viewers + Math.floor(Math.random()*5)+1);
      moveHaydo('chair');
      logEvent('🔴 Haydo went live! Stream starting...','good');
      showNotif('+viewers — stream is live!','good');
      updateButtons();
      break;
    case 'endstream':
      S.isLive = false;
      S.streamHours = 0;
      const retention = 0.15;
      S.viewers = Math.max(0, Math.floor(S.viewers * retention));
      moveHaydo('center');
      logEvent('⏹ Stream ended. Most viewers bounced.','neutral');
      updateButtons();
      break;
    case 'eat':
      S.energy = Math.min(100, S.energy + 20);
      if(S.isLive) S.viewers = Math.max(0, S.viewers - Math.floor(S.viewers*0.08));
      moveHaydo('fridge');
      setTimeout(()=>moveHaydo(S.isLive?'chair':'center'),3000);
      logEvent('🍔 Haydo ate some food. Energy +20. Chat called him fat.','neutral');
      break;
    case 'sleep':
      startSleep();
      break;
    case 'edit':
      S.isEditing = true;
      S.energy = Math.max(0, S.energy - 10);
      if(S.isLive) S.viewers = Math.max(0, S.viewers - Math.floor(S.viewers*0.12));
      moveHaydo('desk');
      S.tiktokFollowers += Math.floor(Math.random()*50)+20;
      S.twitchFollowers += Math.floor(Math.random()*15)+5;
      setTimeout(()=>{S.isEditing=false; moveHaydo(S.isLive?'chair':'center');},4000);
      logEvent('✂️ Edited and posted a clip. TikTok numbers moving.','good');
      break;
    case 'tiktok':
      S.tiktokFollowers += Math.floor(Math.random()*80)+10;
      S.energy = Math.max(0, S.energy - 5);
      logEvent('🎵 Posted on TikTok. Algorithm doing its thing.','good');
      break;
    case 'game':
      if(!S.isLive){
        logEvent('💡 Go live first before playing a game on stream!','neutral');
        return;
      }
      S.viewers += Math.floor(Math.random()*8)+2;
      S.energy = Math.max(0, S.energy - 8);
      logEvent('🕹 Haydo loaded up a game. Viewers tuned in.','good');
      break;
  }
  updateUI();
  saveState();
  checkMilestones();
}

// ══════════════════════════════════════════════════════════════════
//  SLEEP
// ══════════════════════════════════════════════════════════════════
function startSleep(){
  if(S.isLive){
    S.isLive = false;
    S.viewers = Math.max(0, Math.floor(S.viewers * 0.1));
    logEvent('😴 Went to sleep mid-stream. Viewers mostly bounced.','bad');
    updateButtons();
  }
  S.isSleeping = true;
  S.hour = 14; // Wake up at 2pm
  S.day++;
  S.energy = Math.min(100, S.energy + 70);
  moveHaydo('bed');
  document.getElementById('sleep-overlay').style.display='flex';
  logEvent('💤 Haydo went to sleep. Waking up Day '+S.day+'.','neutral');
  showNotif('Sleeping... Day '+(S.day)+' incoming','neutral');

  setTimeout(()=>{
    S.isSleeping = false;
    document.getElementById('sleep-overlay').style.display='none';
    moveHaydo('center');
    logEvent('☀️ Day '+S.day+' — Haydo woke up refreshed. Time to grind.','good');
    updateUI();
    saveState();
  }, 4000);
}

// ══════════════════════════════════════════════════════════════════
//  DECISION SYSTEM
// ══════════════════════════════════════════════════════════════════
function queueDecision(dec, immediateAction){
  // Execute the base action immediately, then show decision
  if(immediateAction) executeImmediateAction(immediateAction);
  decisionQueue.push(dec);
  if(!currentDecision) showNextDecision();
}

function showNextDecision(){
  if(decisionQueue.length===0){ currentDecision=null; return; }
  currentDecision = decisionQueue.shift();
  const dec = currentDecision;

  document.getElementById('dec-context').textContent = dec.context || 'EVENT';
  document.getElementById('dec-question').textContent = dec.q;

  const optsEl = document.getElementById('dec-options');
  optsEl.innerHTML='';
  const letters = ['A','B','C','D'];
  dec.opts.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className='dec-opt';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span>${opt.t}`;
    btn.onclick=()=>resolveDecision(opt);
    optsEl.appendChild(btn);
  });

  document.getElementById('decision-overlay').style.display='flex';
}

function resolveDecision(opt){
  document.getElementById('decision-overlay').style.display='none';
  currentDecision=null;

  // Apply effects
  S.viewers = Math.max(0, S.viewers + (opt.v||0));
  S.energy  = Math.max(0, Math.min(100, S.energy + (opt.e||0)));
  S.twitchFollowers = Math.max(0, S.twitchFollowers + (opt.tw||0));
  S.tiktokFollowers = Math.max(0, S.tiktokFollowers + (opt.tk||0));
  S.viewerPeak = Math.max(S.viewerPeak, S.viewers);

  logEvent((opt.type==='good'?'✅ ':opt.type==='bad'?'❌ ':'💬 ') + opt.log, opt.type||'neutral');

  if(opt.v > 0) showNotif('+'+ opt.v+' viewers!','good');
  else if(opt.v < 0) showNotif(opt.v+' viewers','bad');

  updateUI();
  saveState();
  checkMilestones();

  // Show next queued decision
  if(decisionQueue.length > 0){
    setTimeout(showNextDecision, 800);
  }
}

// ══════════════════════════════════════════════════════════════════
//  MILESTONES
// ══════════════════════════════════════════════════════════════════
function checkMilestones(){
  MILESTONES.forEach(m=>{
    const key = JSON.stringify(m);
    if(S.milestonesHit.has(key)) return;
    let hit = false;
    if(m.viewers && S.viewers >= m.viewers) hit=true;
    if(m.twitchFollowers && S.twitchFollowers >= m.twitchFollowers) hit=true;
    if(m.tiktokFollowers && S.tiktokFollowers >= m.tiktokFollowers) hit=true;
    if(hit){
      S.milestonesHit.add(key);
      showMilestone(m);
      saveState();
    }
  });
}

function showMilestone(m){
  document.getElementById('ms-icon').textContent=m.icon;
  document.getElementById('ms-title').textContent=m.title;
  document.getElementById('ms-sub').textContent=m.sub;
  const el=document.getElementById('milestone-pop');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
  logEvent('🏆 MILESTONE: '+m.title+' — '+m.sub,'good');
}

// ══════════════════════════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════════════════════════
function updateUI(){
  // Stats bar
  document.getElementById('stat-viewers').textContent = fmt(S.viewers);
  document.getElementById('stat-energy-num').textContent = S.energy;
  document.getElementById('stat-twitch-followers').textContent = fmt(S.twitchFollowers);
  document.getElementById('stat-tiktok').textContent = fmt(S.tiktokFollowers);
  document.getElementById('day-badge').textContent = 'DAY '+S.day;
  document.getElementById('time-display').textContent = fmtTime(S.hour);

  // Energy bar
  document.getElementById('energy-bar').style.width = S.energy+'%';
  document.getElementById('energy-bar').style.background =
    S.energy > 60 ? 'var(--green)' : S.energy > 30 ? 'var(--gold)' : 'var(--red)';

  // Social panel
  document.getElementById('twitch-display').textContent = fmt(S.twitchFollowers);
  document.getElementById('tiktok-display').textContent = fmt(S.tiktokFollowers);
  document.getElementById('day-display').textContent = S.day;

  // Live badge
  document.getElementById('live-badge').style.display = S.isLive?'block':'none';
  document.getElementById('viewer-bubble').style.display = S.isLive?'block':'none';
  document.getElementById('live-viewer-count').textContent = fmt(S.viewers);

  updateButtons();
}

function updateButtons(){
  const live = S.isLive;
  const sleep = S.isSleeping;
  document.getElementById('btn-stream').disabled    = live||sleep;
  document.getElementById('btn-end-stream').disabled= !live||sleep;
  document.getElementById('btn-game').disabled      = !live||sleep;
  document.getElementById('btn-edit').disabled      = sleep;
  document.getElementById('btn-tiktok').disabled    = sleep;
  document.getElementById('btn-eat').disabled       = sleep;
  document.getElementById('btn-sleep').disabled     = sleep;
  document.getElementById('btn-stream').classList.toggle('active',!live&&!sleep);
  document.getElementById('btn-end-stream').classList.toggle('active',live);
}

function moveHaydo(pos){
  const sprite = document.getElementById('haydo-sprite');
  sprite.style.left = POS[pos]||POS.center;
}

function logEvent(msg, type){
  const log = document.getElementById('event-log');
  const item = document.createElement('div');
  item.className='event-item '+( type||'neutral');
  item.textContent=msg;
  log.appendChild(item);
  log.scrollTop=log.scrollHeight;
  // Keep last 30
  while(log.children.length > 31) log.removeChild(log.children[1]);
}

let notifT;
function showNotif(msg, type){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className='notif show '+(type||'');
  clearTimeout(notifT);
  notifT=setTimeout(()=>el.className='notif',3000);
}

function fmt(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(Math.floor(n));
}

function fmtTime(h){
  const ampm = h>=12?'PM':'AM';
  const h12 = h%12||12;
  return h12+':00 '+ampm;
}

// Init — safely update UI on load without breaking button if elements hidden
try{ updateUI(); }catch(e){ console.log('pre-game UI skipped'); }
</script>
