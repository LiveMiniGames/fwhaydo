<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Family Feud — FwHaydo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Anton&family=Inter:wght@400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wood:#5c2a00;
  --wood2:#7a3800;
  --gold:#f5b800;
  --gold2:#c88800;
  --gold3:#ffe066;
  --tile-blue:#4a7fd4;
  --tile-blue2:#2255aa;
  --tile-blue3:#6699ee;
  --tile-dark:#1a2a6e;
  --bg:#1a0800;
  --surface:#110500;
  --border:#3a1800;
  --muted:#997755;
  --purple:#9147ff;
  --red:#cc1100;
  --green:#22aa44;
}

body{
  background:radial-gradient(ellipse at 50% 30%,#2a1200 0%,#0d0500 60%);
  color:#fff;font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
}

/* ── TOPBAR ── */
#topbar{
  width:100%;background:rgba(0,0,0,.8);border-bottom:1px solid #3a1800;
  padding:0 20px;height:46px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.back-home{color:var(--muted);text-decoration:none;font-size:.74rem;font-weight:700;
  border:1px solid #3a1800;border-radius:4px;padding:4px 10px}
.back-home:hover{color:var(--gold);border-color:var(--gold)}
#tb-title{font-family:'Oswald',sans-serif;font-size:1rem;color:var(--gold);
  letter-spacing:3px;flex:1;text-transform:uppercase}

/* ── VIEWS ── */
.view{display:none;width:100%;max-width:1000px;padding:18px 16px;
  flex-direction:column;align-items:center;gap:16px}
.view.active{display:flex}

/* ══════════════════════════════════════════
   SETUP
══════════════════════════════════════════ */
#setup-box{
  background:#110500;border:2px solid var(--gold2);border-radius:10px;
  padding:28px;width:100%;max-width:600px;display:flex;flex-direction:column;gap:16px;
  box-shadow:0 0 40px rgba(200,136,0,.15);
}
#setup-logo{display:block;width:240px;margin:0 auto 4px}
.cfg-label{font-size:.68rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.cfg-input{
  background:#0a0300;border:1px solid #3a1800;border-radius:6px;
  padding:10px 14px;color:#fff;font-size:.88rem;font-family:inherit;width:100%;outline:none;
}
.cfg-input:focus{border-color:var(--gold)}
textarea.cfg-input{min-height:200px;resize:vertical;font-size:.78rem;line-height:1.7;font-family:monospace}
.cfg-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cfg-note{font-size:.7rem;color:var(--muted);line-height:1.7;
  background:#0a0300;border-radius:6px;padding:10px 12px;border-left:3px solid var(--gold)}
.cfg-note strong{color:var(--gold)}
.parse-ok{font-size:.75rem;font-weight:700;color:#4ade80;min-height:16px}
.parse-err{font-size:.75rem;font-weight:700;color:var(--red);min-height:16px}
.start-btn{
  background:linear-gradient(180deg,var(--gold3),var(--gold),var(--gold2));
  color:#3a1800;border:2px solid var(--wood2);border-radius:8px;padding:14px;
  font-size:1.1rem;font-weight:900;cursor:pointer;font-family:'Oswald',sans-serif;
  letter-spacing:3px;transition:all .2s;width:100%;text-transform:uppercase;
  text-shadow:0 1px 0 rgba(255,255,255,.3);
}
.start-btn:hover{box-shadow:0 4px 20px rgba(245,184,0,.5);transform:translateY(-1px)}
.prev-btn{background:transparent;color:var(--muted);border:1px solid #3a1800;
  border-radius:6px;padding:10px 18px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
.prev-btn:hover{color:var(--gold);border-color:var(--gold)}

/* ══════════════════════════════════════════
   INTRO
══════════════════════════════════════════ */
#intro-view{justify-content:center;min-height:calc(100vh - 46px);
  background:radial-gradient(ellipse at center,rgba(80,40,0,.4) 0%,transparent 70%)}
#intro-logo-img{width:380px;max-width:90vw;
  filter:drop-shadow(0 0 40px rgba(245,184,0,.6)) drop-shadow(0 0 80px rgba(245,184,0,.3));
  animation:logoPulse 2s ease-in-out infinite}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 30px rgba(245,184,0,.5)) drop-shadow(0 0 60px rgba(245,184,0,.2))}
  50%{filter:drop-shadow(0 0 60px rgba(245,184,0,.9)) drop-shadow(0 0 100px rgba(245,184,0,.5))}
}
#intro-sub{font-family:'Oswald',sans-serif;font-size:1.3rem;color:rgba(255,255,255,.55);
  letter-spacing:6px;text-transform:uppercase;margin-top:16px}
#intro-start{
  margin-top:44px;
  background:linear-gradient(180deg,var(--gold3),var(--gold),var(--gold2));
  color:#3a1800;border:2px solid var(--wood2);border-radius:8px;padding:18px 70px;
  font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;
  letter-spacing:4px;cursor:pointer;text-transform:uppercase;transition:all .25s;
  text-shadow:0 1px 0 rgba(255,255,255,.3);
}
#intro-start:hover{transform:scale(1.05);box-shadow:0 8px 32px rgba(245,184,0,.5)}

/* ══════════════════════════════════════════
   GAME VIEW
══════════════════════════════════════════ */
#game-view{max-width:1000px;padding:12px 14px;gap:10px}
#game-layout{width:100%;display:flex;gap:12px;align-items:flex-start}

/* Leaderboard */
#lb-panel{
  width:188px;flex-shrink:0;
  background:#0a0300;border:2px solid var(--gold2);border-radius:8px;overflow:hidden;
  box-shadow:0 0 20px rgba(180,100,0,.2);
}
#lb-head{padding:9px 12px;background:rgba(180,100,0,.25);border-bottom:1px solid #3a1800;
  font-family:'Oswald',sans-serif;font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:var(--gold);
  display:flex;justify-content:space-between}
#lb-list{max-height:500px;overflow-y:auto}
.lb-row{display:flex;align-items:center;gap:7px;padding:7px 11px;
  border-bottom:1px solid rgba(42,18,0,.8)}
.lb-rank{font-family:'Oswald',sans-serif;font-size:.68rem;color:var(--muted);width:16px;font-weight:700}
.lb-rank.g{color:var(--gold)}
.lb-name{font-size:.72rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-pts{font-family:'Oswald',sans-serif;font-size:.78rem;font-weight:700;color:var(--gold)}

/* Board center */
#board-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}

/* Question banner */
#q-banner{
  width:100%;
  background:linear-gradient(180deg,#2a1800,#1c0e00,#2a1800);
  border:3px solid var(--gold2);border-radius:8px;padding:14px 20px;text-align:center;
  box-shadow:0 0 30px rgba(180,100,0,.3),inset 0 0 30px rgba(0,0,0,.4);
  position:relative;
}
#q-banner::before,#q-banner::after{
  content:'';position:absolute;width:18px;height:18px;border-style:solid;border-color:var(--gold);
}
#q-banner::before{top:5px;left:5px;border-width:2px 0 0 2px}
#q-banner::after{top:5px;right:5px;border-width:2px 2px 0 0}
#q-num{font-family:'Oswald',sans-serif;font-size:.62rem;font-weight:700;
  color:var(--gold2);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
#q-text{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:700;
  color:#fff;letter-spacing:.3px;line-height:1.2;text-transform:uppercase;
  text-shadow:0 2px 8px rgba(0,0,0,.7)}

/* Timer */
#timer-wrap{width:100%;display:flex;align-items:center;gap:10px}
#timer-num{font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;
  color:var(--gold);min-width:40px;text-align:center}
#timer-bg{flex:1;height:10px;background:rgba(255,255,255,.07);
  border-radius:5px;overflow:hidden;border:1px solid #3a1800}
#timer-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold));
  border-radius:5px;transition:width 1s linear,background .3s}

/* ══ THE BOARD — matches screenshot exactly ══ */
#ff-board{
  width:100%;
  /* Wood outer frame */
  background:linear-gradient(180deg,#7a3800,#5c2a00,#7a3800);
  border-radius:12px;
  padding:10px;
  box-shadow:0 0 0 2px #c88800,0 0 40px rgba(100,50,0,.5);
}
#ff-board-inner{
  /* Dark inner frame */
  background:#0d0500;
  border-radius:8px;
  padding:4px;
  border:2px solid #c88800;
  box-shadow:inset 0 0 20px rgba(0,0,0,.8);
}
#answer-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:5px;
  background:#0d0500;border-radius:6px;padding:6px;
}

/* ── Tile: matches screenshot — blue rectangle with dark circle number ── */
.ff-tile{position:relative;height:70px;perspective:900px}
.ff-tile-inner{width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.4,0,.2,1);position:relative}
.ff-tile-inner.flipped{transform:rotateY(180deg)}
.ff-front,.ff-back{position:absolute;inset:0;border-radius:7px;backface-visibility:hidden}

/* Unrevealed: blue tile with dark navy number bubble — matches screenshot */
.ff-front{
  background:linear-gradient(180deg,#6699ee 0%,#4a7fd4 30%,#2255aa 70%,#1a3a88 100%);
  border:2px solid #aaccff;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.35),
    inset 0 -2px 4px rgba(0,0,0,.4),
    0 2px 6px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
}
.ff-front-bubble{
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#2a3a8e,#0d1a5e 60%,#060d3a);
  border:3px solid #aabbdd;
  box-shadow:inset 0 2px 4px rgba(255,255,255,.2),0 2px 6px rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}
.ff-front-num{
  font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);
}

/* Revealed: blue tile with answer text */
.ff-back{
  background:linear-gradient(180deg,#6699ee 0%,#4a7fd4 30%,#2255aa 70%,#1a3a88 100%);
  border:2px solid #aaccff;
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.35),
    inset 0 -2px 4px rgba(0,0,0,.4),
    0 0 16px rgba(60,120,255,.5),
    0 2px 6px rgba(0,0,0,.5);
  transform:rotateY(180deg);
  display:flex;align-items:center;padding:0 10px 0 8px;gap:8px;
}
.ff-back-bubble{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 30%,#2a3a8e,#0d1a5e 60%,#060d3a);
  border:3px solid #aabbdd;
  box-shadow:inset 0 2px 3px rgba(255,255,255,.2),0 1px 4px rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}
.ff-back-num{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.7)}
.ff-back-text{
  font-family:'Oswald',sans-serif;font-size:1.05rem;font-weight:700;
  color:#fff;text-transform:uppercase;flex:1;letter-spacing:.3px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}
.ff-back-pts{
  font-family:'Oswald',sans-serif;font-size:1.35rem;font-weight:700;
  color:var(--gold3);text-shadow:0 0 12px rgba(255,220,100,.7);min-width:38px;text-align:right;
}
.ff-finder{position:absolute;bottom:3px;right:9px;
  font-size:.5rem;color:rgba(255,255,255,.45);font-weight:600}

/* Score bar */
#score-bar{
  margin-top:6px;padding-top:8px;border-top:2px solid var(--gold2);
  display:flex;justify-content:center;align-items:center;gap:10px;
}
#score-label{font-family:'Oswald',sans-serif;font-size:.68rem;font-weight:700;
  color:var(--gold2);letter-spacing:3px;text-transform:uppercase}
#score-val{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;
  color:var(--red);text-shadow:0 0 16px rgba(255,50,0,.7);min-width:80px;text-align:center}

/* Host controls */
#host-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%}
.hbtn{padding:9px 18px;font-size:.78rem;font-weight:800;border:none;border-radius:5px;
  cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;
  transition:all .18s;text-transform:uppercase}
.hbtn-gold{background:linear-gradient(180deg,var(--gold3),var(--gold));color:#3a1800;
  border:1px solid var(--gold2)}
.hbtn-gold:hover{box-shadow:0 3px 12px rgba(245,184,0,.4)}
.hbtn-grey{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid #3a1800}
.hbtn-grey:hover{color:var(--gold);border-color:var(--gold)}

/* ══ BETWEEN ══ */
#between-view{justify-content:center;min-height:calc(100vh - 46px)}
#between-box{
  background:#110500;border:2px solid var(--gold2);border-radius:10px;
  padding:28px;max-width:480px;width:100%;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  box-shadow:0 0 40px rgba(180,100,0,.2);
}
#between-title{font-family:'Oswald',sans-serif;font-size:2rem;color:var(--gold);
  letter-spacing:3px;text-transform:uppercase}
#between-sub{font-size:.83rem;color:var(--muted)}
#between-rows{width:100%;display:flex;flex-direction:column;gap:5px}
.bw-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(180,100,0,.1);border-radius:5px;border:1px solid #3a1800}
.bw-name{font-size:.8rem;font-weight:700}
.bw-ans{font-size:.72rem;color:var(--muted);font-family:'Oswald',sans-serif}
.bw-pts{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:700;color:var(--gold)}

/* ══ WIN ══ */
#win-view{justify-content:center;min-height:calc(100vh - 46px)}
.win-trophy{font-size:5rem;animation:wobble 1.5s infinite alternate}
@keyframes wobble{0%{transform:rotate(-10deg)}100%{transform:rotate(10deg)}}
.win-hed{font-family:'Oswald',sans-serif;font-size:.9rem;color:var(--muted);
  letter-spacing:5px;text-transform:uppercase;margin-top:8px}
.win-name{font-family:'Oswald',sans-serif;font-size:3rem;font-weight:700;
  color:var(--gold);text-shadow:0 0 40px rgba(245,184,0,.7);letter-spacing:2px;text-transform:uppercase}
.win-pts{font-size:.9rem;color:var(--muted);margin-top:4px}
#win-lb{width:100%;max-width:340px;background:#110500;border:1px solid #3a1800;
  border-radius:7px;overflow:hidden;margin-top:10px}

/* Flash */
#flash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:999;opacity:0;transition:opacity .18s}
#flash-inner{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;
  padding:18px 44px;border-radius:8px;letter-spacing:2px;text-transform:uppercase;text-align:center}
#flash.show{opacity:1}
.fcorrect{background:rgba(10,40,160,.88);border:3px solid #6699ff;color:#fff;
  box-shadow:0 0 50px rgba(40,100,255,.6)}
.fwrong{background:rgba(140,0,0,.85);border:2px solid #ff3300;color:#fff}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a1800;border-radius:2px}
</style>
</head>
