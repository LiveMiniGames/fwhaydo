<!DOCTYPE html><!-- v1782112762 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪙 Coin Flip — FwHaydo v8</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e1a;--card:#16161f;--border:#2a2a3c;
  --purple:#9147ff;--purple2:#772ce8;--purple3:#bf94ff;
  --blue:#79d9f7;--blue2:#00b4d8;--blue3:#0077b6;
  --green:#00b56a;--red:#eb0400;
  --text:#efeff1;--muted:#adadb8;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

#topbar{width:100%;background:#18181b;border-bottom:1px solid #2a2a3c;padding:0 20px;
  height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-home{color:var(--muted);text-decoration:none;font-size:.78rem;font-weight:600;
  border:1px solid var(--border);border-radius:4px;padding:4px 10px;transition:all .15s}
.back-home:hover{color:#fff;border-color:var(--purple)}
#tb-title{font-weight:900;font-size:.95rem;color:#fff;flex:1}
#tb-live-badge{background:var(--red);color:#fff;font-size:.62rem;font-weight:800;
  padding:3px 7px;border-radius:3px;letter-spacing:.5px}

#main{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 20px;width:100%}

#stats-bar{display:flex;width:100%;max-width:380px;margin-bottom:22px;
  background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.stat{flex:1;padding:12px 10px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-size:1.3rem;font-weight:900;line-height:1}
.stat-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* Result display */
#result-display{font-weight:900;font-size:2rem;height:56px;line-height:56px;margin-bottom:16px;
  text-align:center;letter-spacing:2px;display:flex;align-items:center;justify-content:center;gap:10px}
#result-display.heads{color:var(--blue);text-shadow:0 0 20px rgba(121,217,247,.45)}
#result-display.tails{color:#e8e8e8;text-shadow:0 0 20px rgba(180,180,180,.3)}
#result-img{width:40px;height:40px;border-radius:50%;object-fit:cover;
  border:2px solid rgba(255,255,255,.25);display:none}
#result-img.show{display:block}

/* 3D COIN */
#coin-scene{width:220px;height:220px;perspective:900px;margin-bottom:28px;cursor:pointer}
#coin{width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:rotateY(0deg)}

.coin-face{position:absolute;inset:0;border-radius:50%;backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;gap:4px}

/* HEADS face = blue (pfp has cyan/blue background) */
#heads-face{
  background:radial-gradient(circle at 35% 30%,#a8eeff,var(--blue2) 45%,var(--blue3) 75%,#012a5a);
  box-shadow:inset 0 0 0 7px rgba(255,255,255,.2),inset 0 0 0 12px rgba(0,0,0,.08),
             0 0 0 5px var(--blue3),0 0 40px rgba(0,180,216,.4),0 10px 30px rgba(0,0,0,.7)}

/* TAILS face = dark (FW logo has black background) */
#tails-face{
  background:radial-gradient(circle at 35% 30%,#555,#222 45%,#111 75%,#000);
  box-shadow:inset 0 0 0 7px rgba(255,255,255,.12),inset 0 0 0 12px rgba(0,0,0,.18),
             0 0 0 5px #333,0 0 30px rgba(100,100,100,.3),0 10px 30px rgba(0,0,0,.8);
  transform:rotateY(180deg)}

.coin-img{width:72%;height:72%;border-radius:50%;object-fit:cover;
  border:2px solid rgba(255,255,255,.22);box-shadow:0 0 14px rgba(0,0,0,.5)}
.coin-face-label{font-size:.58rem;font-weight:800;letter-spacing:2px;
  color:rgba(255,255,255,.5);text-transform:uppercase}
.coin-shine{position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(ellipse at 28% 26%,rgba(255,255,255,.38) 0%,transparent 52%);
  pointer-events:none}

/* FLIP BUTTON */
#flip-btn{padding:13px 44px;font-size:1rem;font-weight:800;border:none;border-radius:4px;
  cursor:pointer;background:var(--purple);color:#fff;box-shadow:0 2px 12px rgba(145,71,255,.3);
  transition:all .2s;margin-bottom:22px;letter-spacing:.5px}
#flip-btn:hover:not(:disabled){background:var(--purple2);transform:translateY(-2px);
  box-shadow:0 4px 20px rgba(145,71,255,.5)}
#flip-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* History */
#history-bar{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;
  max-width:380px;margin-bottom:10px;min-height:26px}
.hist-chip{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:.6rem;font-weight:800}
.hist-chip.H{background:rgba(0,180,216,.18);border:1px solid var(--blue2);color:var(--blue)}
.hist-chip.T{background:rgba(80,80,80,.3);border:1px solid #555;color:#aaa}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);
  background:#18181b;border:1px solid var(--border);border-radius:4px;padding:9px 18px;
  font-size:.8rem;color:#fff;z-index:998;transition:transform .28s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

  <div id="history-bar"></div>
</div>

<div id="toast"></div>

<script>
const HEADS_SRC = document.getElementById('coin-heads-img').src; // pfp
const TAILS_SRC = document.getElementById('coin-tails-img').src; // FW

let audioCtx = null;
function getCtx(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playCoinFlip(){
  try{
    const ctx = getCtx(), now = ctx.currentTime;
    const flick = ctx.createOscillator(), flickG = ctx.createGain();
    flick.type='triangle';
    flick.frequency.setValueAtTime(2400,now);
    flick.frequency.exponentialRampToValueAtTime(800,now+0.08);
    flickG.gain.setValueAtTime(0.22,now);
    flickG.gain.exponentialRampToValueAtTime(0.001,now+0.1);
    flick.connect(flickG); flickG.connect(ctx.destination);
    flick.start(now); flick.stop(now+0.12);

    const bufLen=ctx.sampleRate*2.0, buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<bufLen;i++) d[i]=(Math.random()*2-1);
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.8;
    bp.frequency.setValueAtTime(3000,now+0.05);
    bp.frequency.linearRampToValueAtTime(5500,now+0.9);
    bp.frequency.linearRampToValueAtTime(2800,now+1.85);
    const sg=ctx.createGain();
    sg.gain.setValueAtTime(0,now+0.05);
    sg.gain.linearRampToValueAtTime(0.07,now+0.2);
    sg.gain.linearRampToValueAtTime(0.09,now+0.9);
    sg.gain.linearRampToValueAtTime(0.04,now+1.7);
    sg.gain.linearRampToValueAtTime(0,now+1.95);
    noise.connect(bp); bp.connect(sg); sg.connect(ctx.destination);
    noise.start(now+0.05); noise.stop(now+2.05);

    [1050,2100,3150].forEach((freq,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=freq;
      const v=i===0?0.28:i===1?0.14:0.06;
      g.gain.setValueAtTime(0,now+2.0);
      g.gain.linearRampToValueAtTime(v,now+2.006);
      g.gain.exponentialRampToValueAtTime(0.001,now+2.0+0.55-i*0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(now+2.0); o.stop(now+2.7);
    });

    const th=ctx.createOscillator(), thG=ctx.createGain();
    th.type='sine';
    th.frequency.setValueAtTime(160,now+2.0);
    th.frequency.exponentialRampToValueAtTime(60,now+2.12);
    thG.gain.setValueAtTime(0.18,now+2.0);
    thG.gain.exponentialRampToValueAtTime(0.001,now+2.15);
    th.connect(thG); thG.connect(ctx.destination);
    th.start(now+2.0); th.stop(now+2.2);
  }catch(e){}
}

let headsCount=0, tailsCount=0, history=[], streak=0, lastResult=null;
let isFlipping=false, totalRotation=0;

function flipCoin(){
  if(isFlipping) return;
  isFlipping = true;
  const btn = document.getElementById('flip-btn');
  btn.disabled = true; btn.textContent = '⏳ Flipping...';

  const img = document.getElementById('result-img');
  const txt = document.getElementById('result-text');
  const disp = document.getElementById('result-display');
  img.classList.remove('show');
  txt.textContent = '...';
  disp.className = '';
  disp.style.fontSize = '2rem';

  playCoinFlip();

  const isHeads = Math.random() < 0.5;
  const result  = isHeads ? 'heads' : 'tails';
  const spins   = (8 + Math.floor(Math.random() * 5)) * 360;

  let target = isHeads
    ? Math.ceil((totalRotation + spins) / 360) * 360
    : Math.ceil((totalRotation + spins - 180) / 360) * 360 + 180;
  if(target <= totalRotation) target += 360;
  totalRotation = target;

  const coin = document.getElementById('coin');
  coin.style.transition = 'transform 2.2s cubic-bezier(.35,0,.35,1)';
  coin.style.transform  = 'rotateY(' + totalRotation + 'deg)';

  setTimeout(() => {
    isFlipping = false;
    btn.disabled = false;
    btn.textContent = '🪙 FLIP AGAIN';

    if(isHeads) headsCount++; else tailsCount++;
    history.unshift(isHeads ? 'H' : 'T');
    if(history.length > 20) history.pop();
    streak = result === lastResult ? streak + 1 : 1;
    lastResult = result;

    // Show correct image and colored text
    img.src = isHeads ? HEADS_SRC : TAILS_SRC;
    img.classList.add('show');
    txt.textContent = isHeads ? 'HEADS!' : 'TAILS!';
    disp.className = result;
    disp.style.fontSize = '2.4rem';

    updateStats(); renderHistory();
  }, 2250);
}

function updateStats(){
  document.getElementById('heads-count').textContent = headsCount;
  document.getElementById('tails-count').textContent = tailsCount;
  document.getElementById('flips-count').textContent = headsCount + tailsCount;
  const el = document.getElementById('streak-val');
  if(lastResult && streak > 1){
    el.textContent = streak + (lastResult === 'heads' ? '× H' : '× T');
    el.style.color = lastResult === 'heads' ? 'var(--blue)' : '#aaa';
  } else {
    el.textContent = '—'; el.style.color = '#fff';
  }
}

function renderHistory(){
  const bar = document.getElementById('history-bar');
  bar.innerHTML = '';
  history.forEach(r => {
    const chip = document.createElement('div');
    chip.className = 'hist-chip ' + r;
    chip.textContent = r;
    bar.appendChild(chip);
  });
}

let toastT = null;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove('show'), 2500);
}
</script>
