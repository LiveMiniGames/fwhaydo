<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spicy Overlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;background:transparent;overflow:hidden}

#overlay{
  position:absolute;
  bottom:60px;
  left:60px;
  width:520px;
  background:#0d0d0d;
  border:2px solid rgba(249,115,22,0.6);
  border-radius:14px;
  padding:22px 26px;
  box-shadow:0 0 40px rgba(249,115,22,0.3), 0 0 80px rgba(0,0,0,0.5);
  font-family:'Oswald',sans-serif;
  transition:opacity .4s ease;
}

#overlay.hidden{opacity:0;pointer-events:none}

/* Flame emoji header */
#header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
  border-bottom:1px solid rgba(249,115,22,0.3);padding-bottom:12px;
}
#header-icon{font-size:1.8rem;line-height:1}
#header-text{flex:1}
#header-title{font-size:.72rem;font-weight:700;color:rgba(249,115,22,0.8);
  text-transform:uppercase;letter-spacing:3px;margin-bottom:2px}
#food-name{font-size:1.55rem;font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:1px;line-height:1.1}

/* Scoville */
#shu-row{
  font-size:.88rem;color:#facc15;font-weight:700;
  letter-spacing:1px;margin-bottom:14px;
}

/* Heat bar */
#bar-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
}
#bar-label-left{font-size:.65rem;font-weight:700;color:rgba(255,255,255,0.5);
  text-transform:uppercase;letter-spacing:2px}
#bar-pct{font-size:.9rem;font-weight:700;color:#f97316}

#bar-bg{
  width:100%;height:26px;
  background:rgba(255,255,255,0.08);
  border-radius:13px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}
#bar-fill{
  height:100%;border-radius:13px;
  background:linear-gradient(90deg,#22c55e 0%,#facc15 30%,#f97316 60%,#ef4444 80%,#7c3aed 100%);
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px rgba(249,115,22,0.5);
  position:relative;
  width:0%;
}
/* Glow pulse on high heat */
#bar-fill.extreme{animation:pulse-glow 1s ease-in-out infinite alternate}
@keyframes pulse-glow{
  from{box-shadow:0 0 12px rgba(249,115,22,0.5)}
  to{box-shadow:0 0 28px rgba(239,68,68,0.9),0 0 50px rgba(124,58,237,0.5)}
}

/* Scale labels */
#scale-row{
  display:flex;justify-content:space-between;
  margin-top:5px;
}
#scale-row span{font-size:.55rem;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div id="overlay" class="hidden">
  <div id="header">
    <div id="header-icon">🌶️</div>
    <div id="header-text">
      <div id="header-title">Scoville Scale</div>
      <div id="food-name">Waiting...</div>
    </div>
  </div>
  <div id="shu-row">— SHU</div>
  <div id="bar-label">
    <span id="bar-label-left">Heat Level</span>
    <span id="bar-pct">0%</span>
  </div>
  <div id="bar-bg"><div id="bar-fill"></div></div>
  <div id="scale-row">
    <span>Mild</span>
    <span>Medium</span>
    <span>Hot</span>
    <span>Extra Hot</span>
    <span>Extreme</span>
  </div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
// Password must match what you set in the control panel
const PASSWORD = "spicy2024";

// Get Ably key from URL param: overlay.html?key=YOUR_KEY
const params = new URLSearchParams(location.search);
const ABLY_KEY = params.get('key') || '';

if(!ABLY_KEY){
  document.getElementById('food-name').textContent = 'Add ?key=YOUR_ABLY_KEY to the URL';
  document.getElementById('overlay').classList.remove('hidden');
} else {
  const ably = new Ably.Realtime({ key: ABLY_KEY });
  const channel = ably.channels.get('spicy-overlay-' + btoa(PASSWORD).slice(0,8));

  channel.subscribe('state', msg => {
    applyState(msg.data.state, msg.data.items);
  });
}

function applyState(state, items){
  const overlay = document.getElementById('overlay');

  if(!state.visible){
    overlay.classList.add('hidden');
    return;
  }
  overlay.classList.remove('hidden');

  const idx = state.currentItem;
  if(idx === null || idx === undefined || !items[idx]){
    document.getElementById('food-name').textContent = 'Warming up...';
    document.getElementById('shu-row').textContent = '— SHU';
    setBar(0, false);
    return;
  }

  const item = items[idx];
  const pct = state.heatOverride !== null && state.heatOverride !== undefined
    ? state.heatOverride
    : item.pct;

  document.getElementById('food-name').textContent = item.name;
  document.getElementById('shu-row').textContent = item.shu;
  setBar(pct, pct >= 80);
}

function setBar(pct, extreme){
  const fill = document.getElementById('bar-fill');
  const pctEl = document.getElementById('bar-pct');
  fill.style.width = pct + '%';
  pctEl.textContent = pct + '%';
  fill.className = extreme ? 'extreme' : '';
  // Change icon based on heat
  const icon = document.getElementById('header-icon');
  if(pct >= 90) icon.textContent = '💀';
  else if(pct >= 70) icon.textContent = '🔥';
  else if(pct >= 40) icon.textContent = '🌶️';
  else icon.textContent = '🌡️';
}
</script>
</body>
</html>
