<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FwHaydo Slither — Join the Lobby</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e16;--card:#1c1c28;--border:#2a2a3a;--purple:#9147ff;--purple2:#772ce8;
  --green:#2ecc71;--red:#e74c3c;--text:#e8e8f0;--muted:#7a7a96;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
  height:100vh;overflow:hidden;position:relative}

/* ── GAME CANVAS ── */
#game-canvas{position:fixed;inset:0;background:#0a0a12;cursor:none}

/* ── JOIN SCREEN ── */
#join-screen{position:fixed;inset:0;background:rgba(10,10,18,.95);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#join-screen.hidden{display:none}
#join-box{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:32px;width:340px;text-align:center}
#join-box h1{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:6px}
#join-box h1 span{color:var(--purple)}
#join-box p{font-size:.82rem;color:var(--muted);margin-bottom:20px}
#join-name{width:100%;background:#111;border:1px solid var(--border);border-radius:8px;
  color:#fff;padding:11px 14px;font-size:.95rem;font-family:inherit;margin-bottom:12px;text-align:center}
#join-name:focus{outline:none;border-color:var(--purple)}
#join-btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;
  padding:12px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s}
#join-btn:hover{background:var(--purple2)}
#join-status{margin-top:14px;font-size:.78rem;color:var(--muted)}
#join-status.waiting{color:#f1c40f}
#join-status.live{color:var(--green)}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-start;padding:14px}
#hud-left{display:flex;flex-direction:column;gap:8px}
#timer-box{background:rgba(17,17,17,.85);border:1px solid var(--purple);border-radius:8px;
  padding:8px 16px;font-size:1.2rem;font-weight:900;color:#fff;backdrop-filter:blur(6px)}
#timer-box.unlimited{border-color:var(--green);color:var(--green);font-size:.9rem}
#score-box{background:rgba(17,17,17,.85);border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-size:.85rem;color:var(--muted);backdrop-filter:blur(6px)}
#score-box strong{color:#fff}

#leaderboard-box{background:rgba(17,17,17,.85);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;backdrop-filter:blur(6px);min-width:160px;pointer-events:none}
#leaderboard-box h3{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.lb-entry{display:flex;justify-content:space-between;gap:10px;font-size:.78rem;padding:2px 0}
.lb-entry.me{color:var(--purple);font-weight:800}

/* ── MINIMAP ── */
#minimap-wrap{position:fixed;bottom:20px;left:20px;z-index:55;background:rgba(17,17,17,.85);
  border:1px solid var(--border);border-radius:50%;padding:6px;backdrop-filter:blur(6px)}
#minimap-canvas{display:block;border-radius:50%}

/* ── POINTER LOCK HINT ── */
#pointerlock-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:55;
  background:rgba(17,17,17,.85);border:1px solid var(--purple);border-radius:20px;
  padding:7px 16px;font-size:.74rem;color:var(--purple);backdrop-filter:blur(6px);
  display:none;pointer-events:none}
#pointerlock-hint.show{display:block}

/* ── DEATH SCREEN ── */
#death-screen{position:fixed;inset:0;background:rgba(10,10,18,.92);z-index:150;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#death-screen.show{display:flex}
#death-box{background:var(--card);border:2px solid var(--red);border-radius:14px;
  padding:32px;width:320px;text-align:center}
#death-box h2{font-size:1.3rem;font-weight:900;color:var(--red);margin-bottom:8px}
#death-box .ds-score{font-size:2rem;font-weight:900;color:#fff;margin-bottom:4px}
#death-box .ds-sub{font-size:.78rem;color:var(--muted);margin-bottom:18px}
#respawn-btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;
  padding:12px;font-size:.92rem;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s}
#respawn-btn:hover{background:var(--purple2)}

/* ── ROUND END BANNER ── */
#round-end-banner{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:160;
  background:linear-gradient(135deg,#0e3d22,#1a5c35);border:2px solid var(--green);border-radius:12px;
  padding:16px 28px;display:none;text-align:center}
#round-end-banner.show{display:block}
#round-end-banner .reb-title{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--green)}
#round-end-banner .reb-name{font-size:1.4rem;font-weight:900;color:#fff;margin-top:4px}

/* ── MOBILE BOOST BUTTON ── */
#boost-btn{position:fixed;bottom:24px;right:24px;width:74px;height:74px;border-radius:50%;
  background:rgba(145,71,255,.25);border:2px solid var(--purple);z-index:60;display:none;
  align-items:center;justify-content:center;font-size:1.6rem;-webkit-tap-highlight-color:transparent}
#boost-btn.show{display:flex}
#boost-btn.active{background:rgba(145,71,255,.5)}

/* ── HOST PANEL ── */
#host-toggle{position:fixed;top:14px;right:14px;z-index:80;background:rgba(17,17,17,.85);
  border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:.72rem;
  color:var(--muted);cursor:pointer;backdrop-filter:blur(6px);font-family:inherit}
#host-panel{position:fixed;top:14px;right:14px;z-index:90;background:var(--card);
  border:1px solid var(--purple);border-radius:10px;padding:16px;width:240px;display:none}
#host-panel.show{display:block}
#host-panel h3{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--purple);margin-bottom:10px}
.host-row{margin-bottom:10px}
.host-row label{font-size:.7rem;color:var(--muted);display:block;margin-bottom:5px}
.host-row input{width:100%;background:#111;border:1px solid var(--border);border-radius:5px;
  color:#fff;padding:6px 9px;font-size:.8rem;font-family:inherit}
.host-row input:focus{outline:none;border-color:var(--purple)}
.host-btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:6px;
  padding:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:6px}
.host-btn:hover{background:var(--purple2)}
.host-btn.dng{background:#5c1010;border:1px solid var(--red)}
.host-btn.dng:hover{background:var(--red)}
.host-btn.sec{background:#111;border:1px solid var(--border)}
#host-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);
  font-size:1rem;cursor:pointer;font-family:inherit}
#player-count{font-size:.72rem;color:var(--muted);margin-top:8px;text-align:center}

::-webkit-scrollbar{width:5px}
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div id="join-box">
    <h1>FwHaydo<span>.io</span></h1>
    <p>Grow your snake. Avoid other players. Biggest snake wins the round.</p>
    <input type="text" id="join-name" placeholder="Your name" maxlength="20" />
    <input type="text" id="server-url-input" placeholder="wss://your-server.up.railway.app" style="display:none" />
    <button id="join-btn" onclick="joinGame()">Join Lobby</button>
    <div id="join-status">Connecting to server...</div>
    <div id="server-config-link" style="margin-top:10px;font-size:.7rem;color:var(--muted);cursor:pointer;text-decoration:underline" onclick="toggleServerConfig()">Streamer? Set server URL</div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-left">
    <div id="timer-box">No round active</div>
    <div id="score-box">Length: <strong id="my-length">0</strong></div>
  </div>
  <div id="leaderboard-box">
    <h3>🏆 Leaderboard</h3>
    <div id="leaderboard-list"></div>
  </div>
</div>

<!-- Minimap -->
<div id="minimap-wrap">
  <canvas id="minimap-canvas" width="140" height="140"></canvas>
</div>

<!-- Pointer lock hint -->
<div id="pointerlock-hint">🔒 Mouse locked to game — press ESC to release</div>

<!-- Round end banner -->
<div id="round-end-banner">
  <div class="reb-title">Round Winner</div>
  <div class="reb-name" id="reb-name"></div>
</div>

<!-- Death screen -->
<div id="death-screen">
  <div id="death-box">
    <h2>You Died</h2>
    <div class="ds-score" id="ds-score">0</div>
    <div class="ds-sub">final length</div>
    <button id="respawn-btn" onclick="respawn()">Respawn</button>
  </div>
</div>

<!-- Mobile boost button -->
<div id="boost-btn">⚡</div>

<!-- Host controls -->
<button id="host-toggle" onclick="toggleHostPanel()">⚙️ Host</button>
<div id="host-panel">
  <button id="host-close" onclick="toggleHostPanel()">✕</button>
  <h3>Host Controls</h3>
  <div class="host-row">
    <label>Host Key</label>
    <input type="password" id="host-key-input" placeholder="Enter host key" />
  </div>
  <button class="host-btn sec" onclick="authHost()">Authenticate</button>
  <div class="host-row" style="margin-top:14px">
    <label>Round Duration (minutes, blank = unlimited)</label>
    <input type="number" id="round-minutes" placeholder="e.g. 15" />
  </div>
  <button class="host-btn" onclick="hostStartRound()">▶ Start Round</button>
  <button class="host-btn dng" onclick="hostEndRound()">⏹ End Round Now</button>
  <div id="player-count">0 players online</div>
</div>

<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
let SERVER_URL = localStorage.getItem('slither-server') || '';
let ws = null;
let myId = null;
let isHost = false;
let worldRadius = 2200;

// Game state from server
let players = [];
let prevPlayers = []; // previous server snapshot, used to interpolate other players' movement smoothly
let lastStateTime = Date.now();
let stateInterval = 33; // ms between server updates (~30/sec), used to time interpolation
let food = [];
let leaderboard = [];
let roundActive = false;
let roundEndTime = null;
let alive = false;
let myLength = 0;

// Camera / canvas
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let camX = 0, camY = 0;
let targetCamX = 0, targetCamY = 0;
let mouseAngle = 0;
let zoom = 1;
let targetZoom = 1;

// Local client-side prediction for my own snake (removes input delay feel)
let predictedSegments = null;
let predictedAngle = 0;
let correctionX = 0, correctionY = 0; // small drift error, bled off smoothly each frame
let locallyEatenFood = new Set(); // food IDs my prediction already "ate" — hide instantly, server confirms later
const PRED_TURN_RATE = 0.15;   // must match server TURN_RATE
const PRED_BASE_SPEED = 3.6;   // must match server BASE_SPEED
const PRED_BOOST_SPEED = 6.5;  // must match server BOOST_SPEED
const PRED_SEGMENT_SPACING = 4; // must match server SEGMENT_SPACING
let boosting = false;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ═══════════════════════════════════════
//  CONNECTION
// ═══════════════════════════════════════
function toggleServerConfig(){
  const input = document.getElementById('server-url-input');
  if(input.style.display === 'none'){
    input.style.display = 'block';
    input.value = SERVER_URL;
    input.onkeydown = (e) => {
      if(e.key === 'Enter'){
        SERVER_URL = input.value.trim();
        localStorage.setItem('slither-server', SERVER_URL);
        input.style.display = 'none';
        connect();
      }
    };
    input.focus();
  } else {
    SERVER_URL = input.value.trim();
    localStorage.setItem('slither-server', SERVER_URL);
    input.style.display = 'none';
    connect();
  }
}

function connect(){
  if(!SERVER_URL){
    document.getElementById('join-status').textContent = 'No server configured — ask the streamer to set it up';
    document.getElementById('join-status').className = '';
    return;
  }
  document.getElementById('join-status').textContent = 'Connecting...';
  try{
    ws = new WebSocket(SERVER_URL);
  }catch(e){
    document.getElementById('join-status').textContent = 'Could not connect to server';
    return;
  }

  ws.onopen = () => {
    document.getElementById('join-status').textContent = 'Connected — enter your name and join!';
    document.getElementById('join-status').className = 'live';
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    document.getElementById('join-status').textContent = 'Disconnected — refresh to reconnect';
    document.getElementById('join-status').className = '';
  };

  ws.onerror = () => {
    document.getElementById('join-status').textContent = 'Connection error';
    document.getElementById('join-status').className = '';
  };
}

function handleMessage(data){
  if(data.type === 'welcome'){
    myId = data.id;
    worldRadius = data.worldRadius;
    roundActive = data.roundActive;
    roundEndTime = data.roundEndTime;
  }
  if(data.type === 'state'){
    const now = Date.now();
    stateInterval = Math.min(100, Math.max(20, now - lastStateTime)); // measure actual server tick gap
    lastStateTime = now;
    prevPlayers = players; // remember the last snapshot before overwriting
    players = data.players;
    food = data.food;
    // Clean up locally-eaten tracking — once the server's food list no longer contains
    // an ID, we don't need to keep predicting it's eaten anymore
    const currentFoodIds = new Set(food.map(f => f.id));
    locallyEatenFood.forEach(id => { if(!currentFoodIds.has(id)) locallyEatenFood.delete(id); });
    leaderboard = data.leaderboard;
    roundActive = data.roundActive;
    roundEndTime = data.roundEndTime;
    document.getElementById('player-count').textContent = data.playerCount + ' players online';

    const me = players.find(p => p.id === myId);
    if(me){
      myLength = me.length;
      document.getElementById('my-length').textContent = myLength;
      if(me.segments && me.segments[0]){
        targetCamX = me.segments[0].x;
        targetCamY = me.segments[0].y;
        if(!predictedSegments){
          predictedSegments = me.segments.map(s => ({x:s.x, y:s.y}));
          predictedAngle = me.angle || mouseAngle;
        } else {
          const dx = me.segments[0].x - predictedSegments[0].x;
          const dy = me.segments[0].y - predictedSegments[0].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          // If we've drifted too far (e.g. just ate food / round restart), snap position only.
          // IMPORTANT: we deliberately never overwrite predictedAngle from the server here —
          // the server's angle is always at least one network round-trip behind your real mouse
          // position, so trusting it was actively fighting your live turning input and made the
          // snake feel like it kept reverting to going straight. Local angle is always more current.
          if(dist > 150){
            predictedSegments = me.segments.map(s => ({x:s.x, y:s.y}));
            correctionX = 0; correctionY = 0;
          } else {
            correctionX = dx;
            correctionY = dy;
          }
        }
      }
      // Zoom out as snake grows, like real slither.io
      targetZoom = Math.max(0.55, Math.min(1, 1 - (myLength - 12) / 600));
    }
    updateTimer();
    updateLeaderboard();
  }
  if(data.type === 'died'){
    alive = false;
    predictedSegments = null; correctionX = 0; correctionY = 0; locallyEatenFood.clear();
    document.getElementById('ds-score').textContent = data.score;
    document.getElementById('death-screen').classList.add('show');
  }
  if(data.type === 'round-start'){
    roundActive = true;
    roundEndTime = data.roundEndTime;
    document.getElementById('round-end-banner').classList.remove('show');
  }
  if(data.type === 'round-end'){
    roundActive = false;
    if(data.winner){
      document.getElementById('reb-name').textContent = `${data.winner.name} — length ${data.winner.length}`;
      document.getElementById('round-end-banner').classList.add('show');
      setTimeout(()=>document.getElementById('round-end-banner').classList.remove('show'), 8000);
    }
  }
  if(data.type === 'host-confirmed'){
    isHost = true;
    alert('Host authenticated! You can now start/end rounds.');
  }
}

// ═══════════════════════════════════════
//  JOIN / RESPAWN
// ═══════════════════════════════════════
function joinGame(){
  const name = document.getElementById('join-name').value.trim() || 'Player';
  if(!ws || ws.readyState !== WebSocket.OPEN){
    document.getElementById('join-status').textContent = 'Not connected yet, try again in a moment';
    return;
  }
  ws.send(JSON.stringify({ type: 'join', name }));
  alive = true;
  predictedSegments = null; correctionX = 0; correctionY = 0; locallyEatenFood.clear(); // reset prediction, will rebuild from next server state
  virtualCursorX = 0; virtualCursorY = 0;
  document.getElementById('join-screen').classList.add('hidden');
  document.getElementById('death-screen').classList.remove('show');
  if('ontouchstart' in window) document.getElementById('boost-btn').classList.add('show');
  else canvas.requestPointerLock(); // lock mouse immediately on desktop
}

function respawn(){
  const name = document.getElementById('join-name').value.trim() || 'Player';
  ws.send(JSON.stringify({ type: 'join', name }));
  alive = true;
  predictedSegments = null; correctionX = 0; correctionY = 0; locallyEatenFood.clear(); // reset prediction, will rebuild from next server state
  virtualCursorX = 0; virtualCursorY = 0;
  document.getElementById('death-screen').classList.remove('show');
  if(!('ontouchstart' in window)) canvas.requestPointerLock();
}

// ═══════════════════════════════════════
//  HOST CONTROLS
// ═══════════════════════════════════════
function toggleHostPanel(){
  document.getElementById('host-panel').classList.toggle('show');
}
function authHost(){
  const key = document.getElementById('host-key-input').value.trim();
  if(!key){ alert('Enter the host key first'); return; }
  ws.send(JSON.stringify({ type: 'host-auth', hostKey: key }));
}
function hostStartRound(){
  if(!isHost){ alert('Authenticate as host first'); return; }
  const minutesVal = document.getElementById('round-minutes').value.trim();
  const minutes = minutesVal ? parseFloat(minutesVal) : null;
  ws.send(JSON.stringify({ type: 'host-start-round', minutes }));
}
function hostEndRound(){
  if(!isHost){ alert('Authenticate as host first'); return; }
  ws.send(JSON.stringify({ type: 'host-end-round' }));
}

// ═══════════════════════════════════════
//  INPUT (with Pointer Lock to keep mouse from leaving the game)
// ═══════════════════════════════════════
let virtualCursorX = 0, virtualCursorY = 0; // offset from canvas center, used while pointer-locked
let pointerLocked = false;
const MAX_CURSOR_DIST = 110; // how far the virtual cursor can travel from center (smaller = more sensitive turning, closer to real slither.io feel)

canvas.addEventListener('click', () => {
  if(alive && !pointerLocked) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
  document.getElementById('pointerlock-hint').classList.toggle('show', pointerLocked);
});

canvas.addEventListener('mousemove', e => {
  if(pointerLocked){
    // Relative movement while locked — build a virtual cursor position
    virtualCursorX += e.movementX;
    virtualCursorY += e.movementY;
    const dist = Math.sqrt(virtualCursorX**2 + virtualCursorY**2);
    if(dist > MAX_CURSOR_DIST){
      virtualCursorX = (virtualCursorX / dist) * MAX_CURSOR_DIST;
      virtualCursorY = (virtualCursorY / dist) * MAX_CURSOR_DIST;
    }
    mouseAngle = Math.atan2(virtualCursorY, virtualCursorX);
  } else {
    // Fallback: normal absolute mouse position (before pointer lock is engaged)
    const dx = e.clientX - canvas.width/2;
    const dy = e.clientY - canvas.height/2;
    mouseAngle = Math.atan2(dy, dx);
  }
});
canvas.addEventListener('mousedown', () => boosting = true);
canvas.addEventListener('mouseup', () => boosting = false);

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - canvas.width/2;
  const dy = t.clientY - canvas.height/2;
  mouseAngle = Math.atan2(dy, dx);
}, {passive:false});

document.getElementById('boost-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  boosting = true;
  document.getElementById('boost-btn').classList.add('active');
});
document.getElementById('boost-btn').addEventListener('touchend', e => {
  e.preventDefault();
  boosting = false;
  document.getElementById('boost-btn').classList.remove('active');
});

// ═══════════════════════════════════════
//  CLIENT-SIDE PREDICTION (removes input delay feel)
// ═══════════════════════════════════════
function simulatePrediction(){
  if(!predictedSegments || !alive) return;

  // Bleed off any accumulated drift correction smoothly across the WHOLE body at once,
  // so the snake stays a coherent connected shape instead of the head pulling away from the tail
  if(Math.abs(correctionX) > 0.01 || Math.abs(correctionY) > 0.01){
    const bleed = 0.08; // fraction of remaining error corrected per frame
    const shiftX = correctionX * bleed;
    const shiftY = correctionY * bleed;
    predictedSegments.forEach(seg => { seg.x += shiftX; seg.y += shiftY; });
    correctionX -= shiftX;
    correctionY -= shiftY;
  }

  // Turn toward mouse angle smoothly, same math as server
  let diff = mouseAngle - predictedAngle;
  while(diff > Math.PI) diff -= Math.PI*2;
  while(diff < -Math.PI) diff += Math.PI*2;
  predictedAngle += Math.max(-PRED_TURN_RATE, Math.min(PRED_TURN_RATE, diff));

  const speed = boosting && myLength > 14 ? PRED_BOOST_SPEED : PRED_BASE_SPEED;
  const head = predictedSegments[0];
  let newHead = {
    x: head.x + Math.cos(predictedAngle) * speed,
    y: head.y + Math.sin(predictedAngle) * speed
  };
  // Circular world boundary, matches server — predicted death at the wall.
  // We mark prediction as dead immediately so the snake visually stops responding
  // to input right at the wall instead of silently freezing in place every frame
  // while still drawing as if alive (which looked like a glitch/hang).
  const distFromCenter = Math.sqrt(newHead.x*newHead.x + newHead.y*newHead.y);
  if(!isFinite(distFromCenter) || distFromCenter > worldRadius){
    predictedSegments = null; // server's 'died' message will follow shortly and show the death screen
    return;
  }

  predictedSegments.unshift(newHead);
  const targetCount = Math.max(20, Math.floor(myLength * 2.2));
  while(predictedSegments.length > targetCount) predictedSegments.pop();

  targetCamX = newHead.x;
  targetCamY = newHead.y;

  // Predicted food eating — hide it instantly on my screen the moment my (predicted) head
  // touches it, rather than waiting up to ~1-2 server ticks for the real removal to arrive
  food.forEach(f => {
    if(locallyEatenFood.has(f.id)) return;
    const dx = newHead.x - f.x, dy = newHead.y - f.y;
    if(dx*dx + dy*dy < 20*20){
      locallyEatenFood.add(f.id);
    }
  });
}

// Send input to server ~15x/sec
setInterval(() => {
  if(ws && ws.readyState === WebSocket.OPEN && alive && isFinite(mouseAngle)){
    ws.send(JSON.stringify({ type: 'input', angle: mouseAngle, boosting }));
  }
}, 66);

// ═══════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════
function getInterpolatedSegments(p){
  // Find this player's previous-snapshot segments to blend from
  const prev = prevPlayers.find(pp => pp.id === p.id);
  if(!prev || !prev.segments || prev.segments.length === 0) return p.segments;

  const elapsed = Date.now() - lastStateTime;
  const t = Math.min(1, elapsed / stateInterval); // 0 = at prev snapshot, 1 = at current snapshot

  const len = Math.min(prev.segments.length, p.segments.length);
  const blended = [];
  for(let i = 0; i < len; i++){
    blended.push({
      x: prev.segments[i].x + (p.segments[i].x - prev.segments[i].x) * t,
      y: prev.segments[i].y + (p.segments[i].y - prev.segments[i].y) * t
    });
  }
  // If current snake grew longer than prev, just append the extra new segments as-is
  for(let i = len; i < p.segments.length; i++) blended.push(p.segments[i]);
  return blended;
}

function worldToScreen(x, y){
  return {
    x: (x - camX) * zoom + canvas.width/2,
    y: (y - camY) * zoom + canvas.height/2
  };
}

function render(){
  // Run local prediction so my snake responds instantly to mouse movement
  simulatePrediction();

  // Smoothly move camera toward target position (eliminates choppy snapping)
  camX += (targetCamX - camX) * 0.3;
  camY += (targetCamY - camY) * 0.3;
  zoom += (targetZoom - zoom) * 0.05;

  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid background
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 100 * zoom;
  const offsetX = (-camX * zoom) % gridSize;
  const offsetY = (-camY * zoom) % gridSize;
  for(let x = offsetX; x < canvas.width; x += gridSize){
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for(let y = offsetY; y < canvas.height; y += gridSize){
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // World boundary wall (circular, glowing red edge — visible when nearby)
  const wallCenter = worldToScreen(0, 0);
  const wallRadiusPx = worldRadius * zoom;
  ctx.strokeStyle = 'rgba(231,76,60,0.6)';
  ctx.lineWidth = 6 * zoom;
  ctx.shadowColor = '#e74c3c';
  ctx.shadowBlur = 20 * zoom;
  ctx.beginPath();
  ctx.arc(wallCenter.x, wallCenter.y, wallRadiusPx, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Food
  const pulseScale = 1 + Math.sin(Date.now() / 300) * 0.15;
  food.forEach(f => {
    if(locallyEatenFood.has(f.id)) return; // already predicted as eaten, hide instantly
    const s = worldToScreen(f.x, f.y);
    if(s.x < -20 || s.x > canvas.width+20 || s.y < -20 || s.y > canvas.height+20) return;
    const color = f.color || '#f1c40f';
    const radius = (f.value > 1 ? 6 : 4) * pulseScale * zoom;

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 8 * zoom;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, radius, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Players
  players.forEach(p => {
    if(!p.segments || p.segments.length === 0) return;

    // Use locally-predicted segments for my own snake (instant response to input),
    // interpolated segments for everyone else (smooths out the 30/sec network update steps)
    const segs = (p.id === myId && predictedSegments) ? predictedSegments : getInterpolatedSegments(p);

    // Glow under the snake body
    ctx.shadowColor = p.color;
    ctx.shadowBlur = (p.id === myId ? 14 : 6) * zoom;
    ctx.strokeStyle = p.color;
    // Snake gets noticeably fatter as it grows — uses a square-root curve so growth
    // is very visible early on (first 50-100 food) and gradually tapers at a cap.
    // Capped at 20px, comfortably under the ~24px turning radius so curves stay
    // visually clear at any length instead of getting swallowed by a thick stroke.
    const thickness = Math.min(20, 8 + Math.sqrt(Math.max(0, p.length - 12)) * 2.3);
    ctx.lineWidth = thickness * zoom;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Connect segments with straight lines + round joins. (We tried curve-smoothing here
    // earlier, but quadratic curves cut corners and flattened real turns — this looks
    // smooth enough on its own since segments are spaced closely together.)
    ctx.beginPath();
    segs.forEach((seg, i) => {
      const s = worldToScreen(seg.x, seg.y);
      if(i === 0) ctx.moveTo(s.x, s.y); else ctx.lineTo(s.x, s.y);
    });
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Head highlight
    const head = worldToScreen(segs[0].x, segs[0].y);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(head.x, head.y, (thickness * 0.3) * zoom, 0, Math.PI*2);
    ctx.fill();

    // Name label
    ctx.fillStyle = p.id === myId ? '#fff' : 'rgba(255,255,255,0.7)';
    ctx.font = (p.id === myId ? 'bold ' : '') + Math.max(9, 13*zoom) + 'px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, head.x, head.y - (18 + thickness)*zoom);
  });

  requestAnimationFrame(render);
}
render();

// ═══════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════
const miniCanvas = document.getElementById('minimap-canvas');
const miniCtx = miniCanvas.getContext('2d');

function renderMinimap(){
  const size = 140;
  const scale = size / (worldRadius * 2);
  const center = size / 2;

  miniCtx.clearRect(0, 0, size, size);
  miniCtx.fillStyle = '#0a0a12';
  miniCtx.beginPath();
  miniCtx.arc(center, center, center - 2, 0, Math.PI*2);
  miniCtx.fill();
  miniCtx.strokeStyle = 'rgba(231,76,60,0.6)';
  miniCtx.lineWidth = 2;
  miniCtx.beginPath();
  miniCtx.arc(center, center, center - 2, 0, Math.PI*2);
  miniCtx.stroke();

  // Top 5 leaderboard positions
  leaderboard.forEach((p, i) => {
    const mx = center + p.x * scale;
    const my = center + p.y * scale;
    miniCtx.fillStyle = p.id === myId ? '#fff' : '#9147ff';
    miniCtx.beginPath();
    miniCtx.arc(mx, my, p.id === myId ? 4 : 3, 0, Math.PI*2);
    miniCtx.fill();
  });

  // My own position (always shown even if not top 5)
  const me = players.find(p => p.id === myId);
  if(me && me.segments && me.segments[0]){
    const mx = center + me.segments[0].x * scale;
    const my = center + me.segments[0].y * scale;
    miniCtx.fillStyle = '#fff';
    miniCtx.strokeStyle = '#9147ff';
    miniCtx.lineWidth = 2;
    miniCtx.beginPath();
    miniCtx.arc(mx, my, 4, 0, Math.PI*2);
    miniCtx.fill();
    miniCtx.stroke();
  }

  requestAnimationFrame(renderMinimap);
}
renderMinimap();

// ═══════════════════════════════════════
//  TIMER / LEADERBOARD UI
// ═══════════════════════════════════════
function updateTimer(){
  const box = document.getElementById('timer-box');
  if(!roundActive){
    box.textContent = 'No round active — waiting for host';
    box.className = '';
    return;
  }
  if(!roundEndTime){
    box.textContent = '∞ Unlimited round';
    box.className = 'unlimited';
    return;
  }
  const remaining = Math.max(0, roundEndTime - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  box.textContent = `⏱ ${mins}:${secs.toString().padStart(2,'0')}`;
  box.className = '';
}
setInterval(updateTimer, 500);

function updateLeaderboard(){
  const el = document.getElementById('leaderboard-list');
  el.innerHTML = '';
  if(leaderboard.length === 0){
    el.innerHTML = '<div style="color:var(--muted);font-size:.75rem">No players yet</div>';
    return;
  }
  leaderboard.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-entry' + (p.id === myId ? ' me' : '');
    row.innerHTML = `<span>#${i+1} ${esc(p.name)}</span><span>${p.length}</span>`;
    el.appendChild(row);
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

connect();
</script>
