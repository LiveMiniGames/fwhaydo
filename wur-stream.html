<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Would U Rather — Stream</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:#0a0a14;
  font-family:'Inter',system-ui,sans-serif;user-select:none}

#waiting{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;background:#0a0a14}
#waiting-title{font-size:2rem;font-weight:900;color:rgba(255,255,255,.15);letter-spacing:4px;text-transform:uppercase}

#game{position:absolute;inset:0;display:none;flex-direction:row}

/* Blue side */
#side1{flex:1;background:#1d4ed8;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;position:relative;
  transition:filter .15s}
#side1:hover{filter:brightness(1.1)}
#side1:active{filter:brightness(.9)}
#side1-text{font-size:2.2rem;font-weight:900;color:#fff;text-align:center;
  padding:40px 60px;line-height:1.3;text-shadow:0 2px 12px rgba(0,0,0,.4);
  max-width:760px}
#count1{position:absolute;bottom:40px;font-size:1.8rem;font-weight:900;
  color:rgba(255,255,255,.7)}
#bar1{position:absolute;bottom:0;left:0;right:0;height:12px;background:#93c5fd;
  transition:width .5s ease}
#pct1{position:absolute;top:30px;font-size:1.1rem;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:2px}

/* OR divider */
#or-divider{width:90px;flex-shrink:0;background:#0a0a14;display:flex;
  align-items:center;justify-content:center;z-index:1;position:relative}
#or-circle{width:72px;height:72px;border-radius:50%;background:#0a0a14;
  border:3px solid rgba(255,255,255,.2);display:flex;align-items:center;
  justify-content:center;font-size:.9rem;font-weight:900;color:rgba(255,255,255,.6);
  letter-spacing:1px;box-shadow:0 0 30px rgba(0,0,0,.8)}

/* Red side */
#side2{flex:1;background:#dc2626;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;position:relative;
  transition:filter .15s}
#side2:hover{filter:brightness(1.1)}
#side2:active{filter:brightness(.9)}
#side2-text{font-size:2.2rem;font-weight:900;color:#fff;text-align:center;
  padding:40px 60px;line-height:1.3;text-shadow:0 2px 12px rgba(0,0,0,.4);
  max-width:760px}
#count2{position:absolute;bottom:40px;font-size:1.8rem;font-weight:900;
  color:rgba(255,255,255,.7)}
#bar2{position:absolute;bottom:0;right:0;height:12px;background:#fca5a5;
  transition:width .5s ease}
#pct2{position:absolute;top:30px;font-size:1.1rem;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:2px}

/* WUR title bar at top */
#wur-header{position:absolute;top:0;left:0;right:0;height:60px;
  background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:900;color:rgba(255,255,255,.4);letter-spacing:6px;
  text-transform:uppercase;pointer-events:none;z-index:2}

/* Result flash */
#result-flash{position:absolute;inset:0;display:none;align-items:center;
  justify-content:center;flex-direction:column;gap:16px;
  background:rgba(0,0,0,.85);z-index:10}
#result-winner{font-size:2.8rem;font-weight:900;text-align:center;
  padding:20px 60px;border-radius:12px;max-width:1000px;line-height:1.3}
#result-sub{font-size:1.2rem;color:rgba(255,255,255,.5);font-weight:700}
#result-next{font-size:.9rem;color:rgba(255,255,255,.3);margin-top:8px}
</style>
</head>
<body>

<div id="waiting">
  <div id="waiting-title">Would U Rather</div>
</div>

<div id="game">
  <div id="wur-header">WOULD YOU RATHER...</div>
  <div id="side1" onclick="pick(1)">
    <div id="pct1">0%</div>
    <div id="side1-text">—</div>
    <div id="count1">0 votes</div>
    <div id="bar1" style="width:50%"></div>
  </div>
  <div id="or-divider"><div id="or-circle">OR</div></div>
  <div id="side2" onclick="pick(2)">
    <div id="pct2">0%</div>
    <div id="side2-text">—</div>
    <div id="count2">0 votes</div>
    <div id="bar2" style="width:50%"></div>
  </div>
  <div id="result-flash">
    <div id="result-winner"></div>
    <div id="result-sub"></div>
    <div id="result-next">Loading next question...</div>
  </div>
</div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
const KEY = new URLSearchParams(location.search).get('key')||'';
let votes={1:0,2:0}, voters={}, activeWUR=null, ch;

if(!KEY){
  document.getElementById('waiting-title').textContent='Add ?key=YOUR_ABLY_KEY to the URL';
} else {
  const ab = new Ably.Realtime({key:KEY});
  ab.connection.on('connected', ()=>{
    ch = ab.channels.get('wur-game');

    // Receive new WUR from host
    ch.subscribe('active-wur', msg=>{
      const d = msg.data;
      if(!d || !d.active){
        document.getElementById('game').style.display='none';
        document.getElementById('waiting').style.display='flex';
        activeWUR = null;
        return;
      }
      activeWUR = d;
      votes={1:0,2:0}; voters={};
      document.getElementById('side1-text').textContent = d.a;
      document.getElementById('side2-text').textContent = d.b;
      document.getElementById('result-flash').style.display='none';
      document.getElementById('game').style.display='flex';
      document.getElementById('waiting').style.display='none';
      updateBars();
    });

    // Receive votes forwarded from host (chat typing 1 or 2)
    ch.subscribe('vote', msg=>{
      const {user,choice} = msg.data;
      if(voters[user]) return;
      voters[user]=choice;
      votes[choice]=(votes[choice]||0)+1;
      updateBars();
    });
  });
}

function pick(side){
  if(!activeWUR || !ch) return;
  // Show result briefly then signal host to send next
  const winner = side===1 ? activeWUR.a : activeWUR.b;
  const loser  = side===1 ? activeWUR.b : activeWUR.a;
  const wv=votes[side]||0, lv=votes[side===1?2:1]||0, total=Math.max(1,wv+lv);
  const pct = Math.round(wv/total*100);

  document.getElementById('result-winner').textContent = winner;
  document.getElementById('result-winner').style.cssText =
    side===1 ? 'background:rgba(29,78,216,.4);border:2px solid #3b82f6;color:#dbeafe'
             : 'background:rgba(220,38,38,.4);border:2px solid #ef4444;color:#fee2e2';
  document.getElementById('result-sub').textContent = pct+'% of chat chose this';
  document.getElementById('result-flash').style.display='flex';

  // Tell host: streamer picked, load next
  ch.publish('streamer-pick', {picked: side, a: activeWUR.a, b: activeWUR.b,
    v1: votes[1]||0, v2: votes[2]||0});

  setTimeout(()=>{
    document.getElementById('result-flash').style.display='none';
  }, 2800);
}

function updateBars(){
  const t=Math.max(1,(votes[1]||0)+(votes[2]||0));
  const p1=Math.round((votes[1]||0)/t*100), p2=100-p1;
  document.getElementById('bar1').style.width=p1+'%';
  document.getElementById('bar2').style.width=p2+'%';
  document.getElementById('pct1').textContent=p1+'%';
  document.getElementById('pct2').textContent=p2+'%';
  const v1=votes[1]||0,v2=votes[2]||0;
  document.getElementById('count1').textContent=v1+' vote'+(v1!==1?'s':'');
  document.getElementById('count2').textContent=v2+' vote'+(v2!==1?'s':'');
}
</script>
</body>
</html>
