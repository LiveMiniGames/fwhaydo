<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FwHaydo Weight Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100vh;overflow:hidden;
  background:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  font-family:'Inter',sans-serif;user-select:none;
}
#weight-display{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0 8px;z-index:100;pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);
}
#weight-num{
  font-family:'Anton',sans-serif;font-size:5.5rem;color:#fff;
  text-shadow:0 0 30px rgba(255,80,0,.8),0 4px 12px rgba(0,0,0,.9);
  line-height:1;letter-spacing:2px;
}
#weight-num.bump{animation:bump .2s ease}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.18);color:#ff4400}}
#weight-lbl{font-size:.9rem;font-weight:700;color:rgba(255,255,255,.4);
  text-transform:uppercase;letter-spacing:4px;margin-top:2px}
#bar-wrap{width:300px;height:11px;background:rgba(255,255,255,.08);
  border-radius:5px;overflow:hidden;margin-top:8px}
#bar{height:100%;
  background:linear-gradient(90deg,#22c55e,#facc15,#f97316,#ef4444,#7c3aed);
  border-radius:5px;transition:width .4s ease;width:0%}
#next-stage{font-size:.7rem;color:rgba(255,255,255,.25);margin-top:4px;
  font-weight:700;letter-spacing:2px;text-transform:uppercase}

#char-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;
  display:flex;align-items:flex-end;justify-content:center;
}
.stage-img{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  height:70vh;width:auto;max-width:95vw;
  object-fit:contain;object-position:center bottom;
  opacity:0;transition:opacity 1.2s ease, height .6s cubic-bezier(.34,1.1,.64,1);
  pointer-events:none;
}
.stage-img.visible{opacity:1}
#size-ref{height:70vh;width:1px;display:block;position:relative}
.stage-img.jiggle{animation:jiggle .3s ease}
@keyframes jiggle{
  0%,100%{transform:translateX(-50%) scaleX(1)}
  25%{transform:translateX(-50%) scaleX(1.07) scaleY(.94)}
  50%{transform:translateX(-50%) scaleX(.93) scaleY(1.07)}
  75%{transform:translateX(-50%) scaleX(1.04) scaleY(.97)}
}

#feed-flash{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  font-family:'Anton',sans-serif;font-size:4rem;color:#f97316;
  text-shadow:0 0 30px rgba(249,115,22,.9);
  pointer-events:none;z-index:400;opacity:0;transition:opacity .08s;white-space:nowrap;
}
#feed-flash.show{opacity:1}

.particle{position:fixed;pointer-events:none;z-index:300;font-weight:900;
  animation:floatUp .9s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-90px)}}

#toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,.93);border:3px solid #f97316;border-radius:14px;
  padding:22px 44px;text-align:center;z-index:500;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:90vw;
}
#toast.show{transform:translate(-50%,-50%) scale(1)}
#toast-title{font-family:'Anton',sans-serif;font-size:2.2rem;color:#f97316;letter-spacing:2px}
#toast-sub{font-size:.85rem;color:rgba(255,255,255,.55);margin-top:6px;font-weight:700}

#feed-log{
  position:fixed;bottom:16px;left:16px;
  display:flex;flex-direction:column-reverse;gap:4px;z-index:200;pointer-events:none;max-width:240px;
}
.log-item{
  font-size:.75rem;font-weight:700;color:rgba(255,255,255,.65);
  background:rgba(0,0,0,.55);border-radius:4px;padding:4px 10px;
  animation:fadeLog 3s ease forwards;
}
@keyframes fadeLog{0%{opacity:1}75%{opacity:1}100%{opacity:0}}

#explosion{
  position:fixed;inset:0;z-index:600;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;
}
#explosion.active{display:flex}
#explosion.flash{background:rgba(255,255,255,.95)}
.food-emoji{
  position:fixed;font-size:3rem;
  animation:flyFood 1.8s ease forwards;pointer-events:none;z-index:601;
}
@keyframes flyFood{
  0%{transform:translate(0,0) scale(0) rotate(0);opacity:1}
  50%{opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(.8) rotate(var(--r,360deg));opacity:0}
}
#boom-text{
  font-family:'Anton',sans-serif;font-size:6rem;color:#f97316;
  text-shadow:0 0 40px rgba(255,80,0,1),0 0 80px rgba(255,80,0,.6);
  letter-spacing:4px;animation:boomAnim .5s ease forwards;z-index:602;text-align:center;
}
@keyframes boomAnim{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
#boom-sub{font-family:'Anton',sans-serif;font-size:1.6rem;color:#fff;
  letter-spacing:2px;z-index:602;opacity:0;animation:boomSub 1s .5s ease forwards;text-align:center}
@keyframes boomSub{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
#boom-restart{margin-top:16px;font-size:.85rem;color:rgba(255,255,255,.35);
  z-index:602;opacity:0;animation:boomSub 1s 1.5s ease forwards;font-weight:700;letter-spacing:2px}

@keyframes shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-6px,3px)}40%{transform:translate(7px,-4px)}
  60%{transform:translate(-5px,5px)}80%{transform:translate(5px,-3px)}
}
body.shake{animation:shake .35s ease}

#hint{
  position:fixed;bottom:16px;right:16px;
  font-size:.75rem;font-weight:700;color:rgba(255,255,255,.25);
  letter-spacing:1px;z-index:200;text-transform:uppercase;
}
</style>
</head>

  <div id="boom-text">💥 BOOM! 💥</div>
  <div id="boom-sub">HE EXPLODED AT 1,000 LBS</div>
  <div id="boom-restart">Refresh to play again</div>
</div>

<script>
const CHANNEL = new URLSearchParams(location.search).get('ch') || 'fwhaydo';
let weight = 150, exploded = false;
const MIN_W = 150, MAX_W = 1000;

const STAGES = [
  {min:150, max:299, id:'s0', h:70},
  {min:300, max:499, id:'s1', h:84},
  {min:500, max:749, id:'s2', h:97},
  {min:750, max:999, id:'s3', h:112},
];

const MILESTONES = [
  [200,  "200 LBS 😐",    "Still looking trim... for now"],
  [250,  "250 LBS 😬",    "Getting a little thick..."],
  [300,  "300 LBS 🍔",    "CHUBBY UNLOCKED"],
  [350,  "350 LBS 😳",    "He needs a bigger chair"],
  [400,  "400 LBS 🐷",    "FOUR HUNDRED POUNDS"],
  [450,  "450 LBS 🐘",    "The floor is shaking"],
  [500,  "500 LBS 💀",    "FAT UNLOCKED — HOW IS HE ALIVE"],
  [600,  "600 LBS 🌍",    "He has his own gravitational pull"],
  [700,  "700 LBS 🚨",    "Structural damage warning"],
  [750,  "750 LBS 👹",    "ENORMOUS UNLOCKED"],
  [800,  "800 LBS 🚀",    "NASA is tracking him"],
  [900,  "900 LBS ☢️",   "100 lbs until detonation..."],
  [950,  "950 LBS ⚠️",   "WARNING: CRITICAL MASS APPROACHING"],
  [990,  "990 LBS 🧨",   "10 MORE POUNDS UNTIL EXPLOSION"],
  [999,  "999 LBS 😱",   "ONE MORE POUND..."],
];
const hit = new Set();
const FOOD_EMOJIS = ['🍔','🍕','🌮','🍩','🍟','🍗','🧁','🌭','🍫','🥤','🍦','🥪','🍣','🌯','🍪','🥩','🍿','🧆','🥞','🍱'];
const FEED_CMDS = new Set(['!feed','feed','!FEED','FEED','!Feed','Feed','!FEED','!feed ']);

function connectTwitch(){
  setStatus('Connecting...','#facc15');
  const ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen = ()=>{
    ws.send('PASS oauth:x');
    ws.send('NICK justinfan'+Math.floor(Math.random()*99999));
    ws.send('JOIN #'+CHANNEL.toLowerCase());
    setStatus('Connected','#22c55e');
  };
  ws.onmessage = e=>{
    const lines = e.data.split('\r\n');
    for(const raw of lines){
      if(!raw) continue;
      if(raw.indexOf('PING') === 0){ws.send('PONG :tmi.twitch.tv');continue;}
      if(raw.indexOf('366') > -1){setStatus('Live in #'+CHANNEL+' \u2713','#22c55e');continue;}
      if(raw.indexOf('PRIVMSG') === -1) continue;
      let user = 'viewer';
      const tagMatch = raw.match(/display-name=([^;\s]+)/);
      if(tagMatch && tagMatch[1] && tagMatch[1] !== '') user = tagMatch[1];
      else { const pm = raw.match(/^:([^!]+)!/); if(pm) user = pm[1]; }
      const mm = raw.match(/PRIVMSG #[^\s]+ :(.+)/);
      if(!mm) continue;
      const msg = mm[1].trim().toLowerCase();
      if(msg === '!feed' || msg === 'feed'){
        addWeight(user);
      }
    }
  };
  ws.onclose = ()=>{ setStatus('Reconnecting...','#f97316'); setTimeout(connectTwitch,3000); };
  ws.onerror  = ()=>{ setStatus('Error','#ef4444'); ws.close(); };
}

function setStatus(msg, color){
  var el = document.getElementById('conn-status');
  if(!el){
    el = document.createElement('div');
    el.id = 'conn-status';
    el.style.cssText = 'position:fixed;top:8px;right:12px;font-size:.7rem;font-weight:800;' +
      'z-index:999;padding:4px 10px;border-radius:4px;background:rgba(0,0,0,.6);letter-spacing:.5px;font-family:Inter,sans-serif';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.color = color;
}
function addWeight(user){
  if(exploded)return;
  weight=Math.min(MAX_W,weight+1);
  upd(true);
  jiggleAll();
  showFlash(user);
  logFeeder(user);
  if(weight>=500&&weight%50===0)doShake();
  checkMS();
  if(weight>=MAX_W)setTimeout(explode,800);
}

function upd(flash){
  const numEl=document.getElementById('weight-num');
  numEl.textContent=weight.toLocaleString();
  if(flash){
    numEl.classList.remove('bump');void numEl.offsetWidth;numEl.classList.add('bump');
    setTimeout(()=>numEl.classList.remove('bump'),220);
  }
  const pct=((weight-MIN_W)/(MAX_W-MIN_W))*100;
  document.getElementById('bar').style.width=Math.min(100,pct)+'%';

  let active=STAGES[0];
  for(const s of STAGES){if(weight>=s.min&&weight<=s.max){active=s;break;}}
  if(weight>=999)active=STAGES[3];

  STAGES.forEach(s=>{
    const el=document.getElementById(s.id);
    el.classList.toggle('visible',s.id===active.id);
    el.style.height=s.h+'vh';
  });
  document.getElementById('size-ref').style.height=active.h+'vh';

  const nxt=document.getElementById('next-stage');
  const nextS=STAGES.find(s=>s.min>weight);
  if(nextS){nxt.textContent=(nextS.min-weight)+' lbs until next stage';nxt.style.color='rgba(255,255,255,.25)';}
  else if(weight<1000){nxt.textContent=(1000-weight)+' lbs until EXPLOSION 💥';nxt.style.color='rgba(255,80,0,.6)';}
  else{nxt.textContent='';}
}

function jiggleAll(){
  STAGES.forEach(s=>{
    const el=document.getElementById(s.id);
    el.classList.remove('jiggle');void el.offsetWidth;el.classList.add('jiggle');
    setTimeout(()=>el.classList.remove('jiggle'),300);
  });
}

let flashT;
function showFlash(user){
  const ff=document.getElementById('feed-flash');
  ff.textContent='+1 LB '+FOOD_EMOJIS[Math.floor(Math.random()*FOOD_EMOJIS.length)];
  ff.classList.add('show');clearTimeout(flashT);
  flashT=setTimeout(()=>ff.classList.remove('show'),700);
}

function logFeeder(user){
  const log=document.getElementById('feed-log');
  const item=document.createElement('div');item.className='log-item';
  item.textContent='🍔 '+user+' fed him!';
  log.appendChild(item);
  setTimeout(()=>item.remove(),3100);
  while(log.children.length>6)log.removeChild(log.firstChild);
}

function checkMS(){
  for(const[lbs,title,sub]of MILESTONES){
    if(weight>=lbs&&!hit.has(lbs)){
      hit.add(lbs);
      document.getElementById('toast-title').textContent=title;
      document.getElementById('toast-sub').textContent=sub;
      const t=document.getElementById('toast');
      t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);
      break;
    }
  }
}

function explode(){
  exploded=true;
  const ex=document.getElementById('explosion');
  ex.style.background='rgba(0,0,0,0)';
  ex.classList.add('active');
  STAGES.forEach(s=>document.getElementById(s.id).style.transition='opacity .2s');
  STAGES.forEach(s=>document.getElementById(s.id).style.opacity='0');
  setTimeout(()=>{ex.style.background='rgba(255,255,255,.95)';},100);
  setTimeout(()=>{ex.style.background='rgba(0,0,0,.8)';ex.style.transition='background .4s';},350);

  // Explode food everywhere
  for(let i=0;i<35;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='food-emoji';
      el.textContent=FOOD_EMOJIS[Math.floor(Math.random()*FOOD_EMOJIS.length)];
      const cx=window.innerWidth/2, cy=window.innerHeight/2;
      el.style.left=cx+'px';el.style.top=cy+'px';
      const angle=Math.random()*360;
      const dist=150+Math.random()*500;
      const tx=(Math.cos(angle*Math.PI/180)*dist)+'px';
      const ty=(Math.sin(angle*Math.PI/180)*dist)+'px';
      el.style.setProperty('--tx',tx);
      el.style.setProperty('--ty',ty);
      el.style.setProperty('--r',(Math.random()*720-360)+'deg');
      el.style.fontSize=(2+Math.random()*3)+'rem';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1900);
    },Math.random()*500);
  }
  doShake();setTimeout(doShake,150);setTimeout(doShake,300);setTimeout(doShake,500);
}

function doShake(){
  document.body.classList.remove('shake');void document.body.offsetWidth;
  document.body.classList.add('shake');setTimeout(()=>document.body.classList.remove('shake'),350);
}

connectTwitch();
upd(false);
</script>
