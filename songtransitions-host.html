<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Song Transitions</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial, sans-serif; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  #container { position:relative; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

  .back-home{position:absolute;top:14px;left:14px;z-index:50;color:#7a7a96;text-decoration:none;font-size:.78rem;font-weight:600;
    border:1px solid #2a2a3a;border-radius:6px;padding:5px 11px;background:rgba(0,0,0,.4);backdrop-filter:blur(2px)}
  .back-home:hover{color:#fff;border-color:#9147ff}

  #linkCallout { background:linear-gradient(90deg,#0e2818,#123320); border:2px solid #1DB954; border-radius:14px; padding:12px 20px; margin-bottom:20px; max-width:min(700px,90vw); text-align:center; }
  #linkCallout .lbl { font-size:10px; font-weight:900; color:#1DB954; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
  #linkCallout .urlRow { display:flex; align-items:center; gap:10px; justify-content:center; flex-wrap:wrap; }
  #linkCallout code { color:#fff; font-size:13px; background:#000; padding:6px 12px; border-radius:8px; word-break:break-all; }
  #copyBtn { background:#1DB954; border:none; color:#000; font-weight:800; border-radius:20px; padding:8px 18px; cursor:pointer; font-size:12px; }
  #copyBtn:hover { background:#1ed760; }

  h1 { font-size:22px; font-weight:900; color:#1DB954; margin-bottom:20px; }

  #nowPlayingBox { background:#121212; border:1px solid #282828; border-radius:16px; padding:20px 30px; text-align:center; min-width:min(500px,88vw); margin-bottom:16px; }
  #npUser { font-size:18px; font-weight:900; color:#fff; margin-bottom:4px; }
  #npStatus { font-size:12px; color:#1DB954; font-weight:700; margin-bottom:14px; text-transform:uppercase; letter-spacing:1px; }
  .playerRow { display:flex; gap:16px; justify-content:center; margin-bottom:10px; }
  .playerBox { width:280px; }
  .playerLabel { font-size:10px; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  #player1, #player2 { width:280px; height:158px; border-radius:10px; overflow:hidden; background:#000; }

  #queueCount { font-size:12px; color:#999; margin-bottom:16px; }
  #nextBtn { border:none; outline:none; cursor:pointer; font-weight:900; letter-spacing:1px; border-radius:30px; padding:14px 40px; font-size:15px; color:#000; background:#1DB954; }
  #nextBtn:hover { background:#1ed760; }
  #nextBtn:disabled { opacity:.35; cursor:not-allowed; }

  #emptyState { color:#666; font-size:14px; text-align:center; max-width:400px; }
</style>
</head>
<body>
<a class="back-home" href="FwHaydo.html">← FwHaydo</a>
<div id="container">
  <div id="linkCallout">
    <div class="lbl">📋 Give this link to chat so viewers can submit</div>
    <div class="urlRow">
      <code id="viewerLinkText">loading...</code>
      <button id="copyBtn">Copy Link</button>
    </div>
  </div>

  <h1>🎧 Song Transitions</h1>

  <div id="nowPlayingBox">
    <div id="npUser">Waiting for the queue...</div>
    <div id="npStatus"></div>
    <div class="playerRow">
      <div class="playerBox"><div class="playerLabel">Song 1 (outro)</div><div id="player1"></div></div>
      <div class="playerBox"><div class="playerLabel">Song 2 (intro)</div><div id="player2"></div></div>
    </div>
  </div>

  <div id="queueCount">0 in queue</div>
  <button id="nextBtn" disabled>NEXT TRANSITION ▶</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// Try multiple CDNs across different infrastructure in sequence -- if one is
// blocked by an ad-blocker/firewall/DNS filter, the others are very unlikely
// to be blocked by the same rule since they're entirely different providers
(function loadAblyWithFallbacks(){
  const sources = [
    'https://cdn.ably.com/lib/ably.min-2.js',
    'https://cdn.jsdelivr.net/npm/ably@2',
    'https://unpkg.com/ably@2'
  ];
  let i = 0;
  function tryNext(){
    if(i >= sources.length){
      window.__ablyLoadFailed = true;
      window.dispatchEvent(new Event('ably-load-done'));
      return;
    }
    const url = sources[i++];
    const s = document.createElement('script');
    s.src = url;
    s.onload = ()=>{ window.dispatchEvent(new Event('ably-load-done')); };
    s.onerror = ()=>{ s.remove(); tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
<script>
(function(){
  const ABLY_KEY = 'IPJIJg.izmQMA:dEekjEM8ipsEN235S1EdkKEjCpF6y7-A_zfq0-6GGBA';
  const CHANNEL_NAME = 'song-transitions';
  const CLIP_SECONDS = 30;

  let ably, channel;
  let queue = [], currentIndex = -1;
  let ytReady = false;
  let transitionTimer1 = null, transitionTimer2 = null;

  document.getElementById('viewerLinkText').textContent = location.origin + location.pathname.replace('songtransitions-host','songtransitions-submit');
  document.getElementById('copyBtn').addEventListener('click', async ()=>{
    const text = document.getElementById('viewerLinkText').textContent;
    try{ await navigator.clipboard.writeText(text); } catch(e){}
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(()=>btn.textContent=orig, 1500);
  });

  function extractYouTubeId(url){
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }
  function detectPlatform(url){
    if(/youtube\.com|youtu\.be/i.test(url)) return 'youtube';
    if(/open\.spotify\.com/i.test(url)) return 'spotify';
    if(/soundcloud\.com/i.test(url)) return 'soundcloud';
    if(/music\.apple\.com/i.test(url)) return 'applemusic';
    return null;
  }
  function toSpotifyEmbedUrl(url){ return url.replace('open.spotify.com/', 'open.spotify.com/embed/') + (url.includes('?')?'&':'?') + 'autoplay=1'; }
  function toAppleMusicEmbedUrl(url){ return url.replace('music.apple.com/', 'embed.music.apple.com/'); }

  let scWidgets = { 1:null, 2:null };

  // ---------- YouTube IFrame API ----------
  window.onYouTubeIframeAPIReady = function(){ ytReady = true; tryPlayCurrent(); };

  function clearTransitionTimers(){
    if(transitionTimer1){ clearTimeout(transitionTimer1); transitionTimer1=null; }
    if(transitionTimer2){ clearTimeout(transitionTimer2); transitionTimer2=null; }
  }

  // YouTube's onReady event can fire before the video's duration is actually
  // available -- calling getDuration() immediately sometimes returns 0, which
  // was silently causing seeks to fall back to the start of the song instead
  // of the last 30 seconds. This polls briefly until a real duration shows up.
  function waitForValidDuration(player, callback, attempts){
    attempts = attempts || 0;
    const duration = player.getDuration ? player.getDuration() : 0;
    if(duration && duration > 0){
      callback(duration);
    } else if(attempts < 20){
      setTimeout(()=>waitForValidDuration(player, callback, attempts+1), 150);
    } else {
      callback(CLIP_SECONDS); // give up after ~3s and just play from the start rather than hang forever
    }
  }

  // Loads a slot and actually plays it, seeking to the last CLIP_SECONDS.
  // onEnded fires the moment the track genuinely finishes (for platforms that
  // support it), separate from onStarted which fires once playback begins.
  function loadSlotActive(slotNum, url, platform, onStarted, onEnded){
    const container = document.getElementById('player'+slotNum);
    container.innerHTML = '';
    if(platform === 'youtube'){
      const id = extractYouTubeId(url);
      const div = document.createElement('div');
      div.id = 'ytplayer'+slotNum;
      container.appendChild(div);
      const player = new YT.Player(div.id, { height:'158', width:'280', videoId:id, playerVars:{controls:1}, events:{
        onReady:()=>{
          waitForValidDuration(player, (duration)=>{
            player.seekTo(Math.max(0, duration-CLIP_SECONDS), true);
            player.playVideo();
            onStarted(player);
          });
        },
        onStateChange:(e)=>{ if(e.data === YT.PlayerState.ENDED && onEnded) onEnded(); }
      }});
    } else if(platform === 'soundcloud'){
      const iframe = document.createElement('iframe');
      iframe.id = 'scplayer'+slotNum;
      iframe.width = '280'; iframe.height = '158'; iframe.frameBorder = 'no'; iframe.scrolling = 'no';
      iframe.src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(url) + '&auto_play=false';
      container.appendChild(iframe);
      iframe.onload = () => {
        const widget = SC.Widget(iframe);
        widget.bind(SC.Widget.Events.READY, ()=>{
          widget.getDuration((durationMs)=>{
            const safeDurationMs = durationMs && durationMs > 0 ? durationMs : CLIP_SECONDS*1000;
            const seekMs = Math.max(0, safeDurationMs - CLIP_SECONDS*1000);
            widget.seekTo(seekMs);
            widget.play();
            onStarted(widget);
          });
          if(onEnded) widget.bind(SC.Widget.Events.FINISH, onEnded);
        });
      };
    } else if(platform === 'spotify'){
      const iframe = document.createElement('iframe');
      iframe.width = '280'; iframe.height = '158'; iframe.frameBorder = '0';
      iframe.allow = 'autoplay; encrypted-media';
      iframe.src = toSpotifyEmbedUrl(url) + (url.includes('?')?'&':'?') + 'autoplay=1';
      container.appendChild(iframe);
      // no reliable ready/seek/ended control available for free Spotify embeds --
      // it plays whatever preview it serves, we time the transition ourselves
      setTimeout(()=>onStarted(null), 1500);
    } else if(platform === 'applemusic'){
      const iframe = document.createElement('iframe');
      iframe.width = '280'; iframe.height = '158'; iframe.frameBorder = '0';
      iframe.allow = 'autoplay *; encrypted-media *;';
      iframe.src = toAppleMusicEmbedUrl(url);
      container.appendChild(iframe);
      // same limitation as Spotify -- no scriptable seek/ready/ended control available
      setTimeout(()=>onStarted(null), 1500);
    }
  }

  // Loads a slot WITHOUT playing it -- shows the player/thumbnail immediately
  // so both songs are visible from the moment a transition loads, instead of
  // song 2's box sitting empty until song 1 finishes.
  function loadSlotPreview(slotNum, url, platform){
    const container = document.getElementById('player'+slotNum);
    container.innerHTML = '';
    if(platform === 'youtube'){
      const id = extractYouTubeId(url);
      const div = document.createElement('div');
      div.id = 'ytplayer'+slotNum;
      container.appendChild(div);
      new YT.Player(div.id, { height:'158', width:'280', videoId:id, playerVars:{controls:1}, events:{
        onReady:(e)=>{ e.target.cueVideoById(id); } // loads + shows thumbnail, does not play
      }});
    } else if(platform === 'soundcloud'){
      const iframe = document.createElement('iframe');
      iframe.width = '280'; iframe.height = '158'; iframe.frameBorder = 'no'; iframe.scrolling = 'no';
      iframe.src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(url) + '&auto_play=false';
      container.appendChild(iframe);
    } else if(platform === 'spotify'){
      const iframe = document.createElement('iframe');
      iframe.width = '280'; iframe.height = '158'; iframe.frameBorder = '0';
      iframe.allow = 'encrypted-media';
      iframe.src = toSpotifyEmbedUrl(url); // no autoplay param -- sits ready, silent
      container.appendChild(iframe);
    } else if(platform === 'applemusic'){
      const iframe = document.createElement('iframe');
      iframe.width = '280'; iframe.height = '158'; iframe.frameBorder = '0';
      iframe.allow = 'encrypted-media *;';
      iframe.src = toAppleMusicEmbedUrl(url);
      container.appendChild(iframe);
    }
  }

  function tryPlayCurrent(){
    clearTransitionTimers();
    if(currentIndex < 0 || currentIndex >= queue.length) return;
    const item = queue[currentIndex];
    const platform1 = item.platform1 || detectPlatform(item.song1Url);
    const platform2 = item.platform2 || detectPlatform(item.song2Url);
    document.getElementById('npUser').textContent = item.displayName + "'s transition";
    if(!platform1 || !platform2){
      document.getElementById('npStatus').textContent = 'One of these links looks invalid — skip with Next';
      return;
    }
    if(platform1 === 'youtube' && !ytReady) return; // wait for the YT API to finish loading first
    document.getElementById('npStatus').textContent = 'Playing outro of song 1' + (platform1!=='youtube'&&platform1!=='soundcloud' ? ' (preview only for this platform)' : '') + '...';

    // song 2 is visible immediately, just not playing yet
    loadSlotPreview(2, item.song2Url, platform2);

    let advanced = false;
    function advanceToSongTwo(){
      if(advanced) return; // the "ended" event and the timer fallback could both fire -- only act once
      advanced = true;
      clearTransitionTimers();
      playSongTwo();
    }
    loadSlotActive(1, item.song1Url, platform1, ()=>{
      // safety-net timer in case the platform's "ended" event never fires
      transitionTimer1 = setTimeout(advanceToSongTwo, CLIP_SECONDS*1000 + 1500);
    }, advanceToSongTwo);
  }

  function playSongTwo(){
    const item = queue[currentIndex];
    if(!item) return;
    const platform2 = item.platform2 || detectPlatform(item.song2Url);
    document.getElementById('npStatus').textContent = 'Playing intro of song 2' + (platform2!=='youtube'&&platform2!=='soundcloud' ? ' (preview only for this platform)' : '') + '...';
    loadSlotActive(2, item.song2Url, platform2, ()=>{
      transitionTimer2 = setTimeout(()=>{
        document.getElementById('npStatus').textContent = 'Transition complete — click Next when ready';
      }, CLIP_SECONDS*1000 + 800);
    }, null);
  }

  // ---------- Queue sync ----------
  function updateUI(){
    document.getElementById('queueCount').textContent = queue.length + ' in queue';
    document.getElementById('nextBtn').disabled = currentIndex >= queue.length-1;
    if(queue.length === 0){
      document.getElementById('npUser').textContent = 'Waiting for the queue...';
      document.getElementById('npStatus').textContent = '';
    }
  }

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(channel) channel.publish('next-requested', {});
  });

  function waitForAbly(){
    return new Promise(resolve=>{
      if(typeof Ably !== 'undefined' || window.__ablyLoadFailed){ resolve(); return; }
      window.addEventListener('ably-load-done', ()=>resolve(), {once:true});
    });
  }

  async function init(){
    await waitForAbly();
    if(typeof Ably === 'undefined'){
      document.getElementById('npUser').textContent = 'Connection failed — check network and reload';
      return;
    }
    ably = new Ably.Realtime({ key: ABLY_KEY });
    ably.connection.on('connected', ()=>{
      channel = ably.channels.get(CHANNEL_NAME);
      channel.subscribe('queue-snapshot', (msg)=>{
        const wasIndex = currentIndex;
        queue = msg.data.queue || [];
        currentIndex = typeof msg.data.currentIndex === 'number' ? msg.data.currentIndex : -1;
        updateUI();
        if(currentIndex !== wasIndex && currentIndex >= 0) tryPlayCurrent();
      });
      channel.publish('request-snapshot', {});
    });
  }
  init();
})();
</script>
</body>
</html>
