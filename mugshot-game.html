<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Match the Crime — FwHaydo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--card:#1a1a1a;--border:#2a2a2a;
  --orange:#ff6b00;--green:#2dc653;--red:#e63946;--gold:#f4b942;
  --purple:#9147ff;--text:#fff;--muted:#888;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

#topbar{width:100%;max-width:900px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
#tb-title{font-family:'Anton',sans-serif;font-size:1.1rem;color:var(--orange);letter-spacing:2px;flex:1}
.dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.dot.ok{background:var(--green)}
#conn-lbl{font-size:.72rem;color:var(--muted)}

/* LOGIN */
#login-view{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;gap:14px;width:100%;max-width:420px}
.login-title{font-family:'Anton',sans-serif;font-size:2rem;color:var(--orange);letter-spacing:2px;text-align:center}
.inp{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:10px 14px;color:#fff;font-size:.88rem;font-family:inherit;width:100%;outline:none}
.inp:focus{border-color:var(--orange)}
.lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;align-self:flex-start}
.go-btn{background:var(--orange);color:#fff;border:none;border-radius:8px;
  padding:14px;font-size:1rem;font-weight:900;cursor:pointer;font-family:inherit;
  width:100%;letter-spacing:1px;transition:all .2s}
.go-btn:hover{background:#e05e00;transform:translateY(-1px)}
.err{font-size:.78rem;color:var(--red);min-height:16px;text-align:center}

/* GAME */
#game-view{display:none;width:100%;max-width:900px;flex-direction:column;align-items:center;gap:14px}

/* Header info */
#game-header{width:100%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
#round-badge{font-family:'Anton',sans-serif;font-size:1rem;color:var(--orange);letter-spacing:2px}
#score-badge{font-size:.82rem;font-weight:800;color:var(--gold)}
#channel-badge{font-size:.72rem;color:var(--muted)}

/* Main game area */
#game-main{width:100%;display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}

/* Mugshot */
#mugshot-wrap{
  flex-shrink:0;width:260px;
  background:var(--surface);border:3px solid var(--orange);border-radius:10px;
  overflow:hidden;position:relative;
}
#mugshot-img{width:100%;display:block;object-fit:cover}
#mugshot-name{background:var(--orange);color:#fff;font-family:'Anton',sans-serif;
  font-size:1rem;letter-spacing:2px;padding:8px 14px;text-align:center}
#mugshot-label{background:#000;color:var(--orange);font-size:.65rem;font-weight:800;
  letter-spacing:3px;padding:4px 14px;text-align:center;text-transform:uppercase}

/* Options */
#options-wrap{flex:1;min-width:280px;display:flex;flex-direction:column;gap:10px}
#options-title{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:2px}
.opt-btn{
  background:var(--card);border:2px solid var(--border);border-radius:8px;
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;
  transition:all .18s;text-align:left;font-family:inherit;color:var(--text);
}
.opt-btn:hover{border-color:var(--orange);background:rgba(255,107,0,.1)}
.opt-btn.winner{border-color:var(--green);background:rgba(45,198,83,.15);animation:pulse .5s ease 3}
.opt-btn.loser{border-color:var(--border);opacity:.4}
.opt-btn.revealed-correct{border-color:var(--green);background:rgba(45,198,83,.2)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.opt-letter{font-family:'Anton',sans-serif;font-size:1.4rem;color:var(--orange);
  flex-shrink:0;width:24px;line-height:1}
.opt-text{font-size:.82rem;font-weight:700;line-height:1.4;flex:1}
.vote-bar-wrap{margin-top:6px;width:100%}
.vote-bar-bg{background:rgba(255,255,255,.08);border-radius:3px;height:6px;overflow:hidden;margin-top:4px}
.vote-bar-fill{height:100%;background:var(--orange);border-radius:3px;transition:width .4s ease}
.vote-count{font-size:.65rem;color:var(--muted);margin-top:2px;font-weight:700}

/* Chat voting display */
#chat-status{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#chat-hint{font-size:.78rem;color:var(--muted);flex:1}
#chat-timer{font-family:'Anton',sans-serif;font-size:1.8rem;color:var(--orange);min-width:40px;text-align:center}
#timer-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
#timer-bar{height:100%;background:var(--orange);border-radius:4px;transition:width 1s linear}

/* Reveal */
#reveal-wrap{width:100%;background:rgba(45,198,83,.1);border:2px solid var(--green);
  border-radius:10px;padding:16px 20px;display:none;flex-direction:column;gap:8px}
#reveal-answer{font-family:'Anton',sans-serif;font-size:1.4rem;color:var(--green);letter-spacing:1px}
#reveal-detail{font-size:.82rem;color:rgba(255,255,255,.7);line-height:1.5}
#reveal-winners{font-size:.78rem;color:var(--gold);font-weight:700;margin-top:4px}

/* Host controls */
#host-bar{width:100%;display:flex;gap:8px;flex-wrap:wrap}
.hbtn{padding:10px 20px;font-size:.82rem;font-weight:800;border:none;border-radius:6px;
  cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:all .2s}
.hbtn-orange{background:var(--orange);color:#fff}
.hbtn-orange:hover{background:#e05e00}
.hbtn-grey{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.hbtn-grey:hover{color:#fff;border-color:var(--orange)}
.hbtn-green{background:var(--green);color:#000}

/* Leaderboard */
#lb-wrap{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;display:none}
#lb-title{font-size:.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
#lb-list{display:flex;flex-direction:column;gap:4px}
.lb-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:5px}
.lb-rank{font-size:.7rem;font-weight:800;color:var(--muted);width:20px}
.lb-rank.g{color:var(--gold)}
.lb-name{font-size:.78rem;font-weight:700;flex:1}
.lb-pts{font-size:.78rem;font-weight:900;color:var(--gold)}

/* URL box */
#url-box{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;font-size:.72rem;color:var(--muted);word-break:break-all}
#url-box b{color:var(--orange);display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="topbar">
  <span id="tb-title">🚔 MATCH THE CRIME</span>
  <div class="dot" id="dot"></div>
  <span id="conn-lbl">Not connected</span>
</div>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-title">🚔 MATCH THE CRIME</div>
  <div style="width:100%"><div class="lbl">Twitch Channel</div><input class="inp" id="inp-ch" type="text" placeholder="fwhaydo" value="fwhaydo"/></div>
  <div style="width:100%"><div class="lbl">Voting Time Per Round (seconds)</div><input class="inp" id="inp-timer" type="number" value="25" min="10" max="60"/></div>
  <button class="go-btn" onclick="doConnect()">CONNECT AND START →</button>
  <div class="err" id="login-err"></div>
</div>

<!-- GAME -->
<div id="game-view">
  <div id="game-header">
    <span id="round-badge">ROUND 1 OF 8</span>
    <span id="score-badge">Scores: 0 players</span>
    <span id="channel-badge">twitch.tv/fwhaydo</span>
  </div>

  <div id="game-main">
    <div id="mugshot-wrap">
      <div id="mugshot-label">🚔 WANTED</div>
      <img id="mugshot-img" src="" alt="Suspect"/>
      <div id="mugshot-name">SUSPECT #1</div>
    </div>
    <div id="options-wrap">
      <div id="options-title">What did they do? Chat votes A B C or D</div>
      <button class="opt-btn" id="opt-0" onclick="hostPick(0)">
        <span class="opt-letter">A</span>
        <div style="flex:1"><div class="opt-text" id="opt-text-0"></div><div class="vote-bar-wrap"><div class="vote-bar-bg"><div class="vote-bar-fill" id="bar-0" style="width:0%"></div></div><div class="vote-count" id="vc-0">0 votes</div></div></div>
      </button>
      <button class="opt-btn" id="opt-1" onclick="hostPick(1)">
        <span class="opt-letter">B</span>
        <div style="flex:1"><div class="opt-text" id="opt-text-1"></div><div class="vote-bar-wrap"><div class="vote-bar-bg"><div class="vote-bar-fill" id="bar-1" style="width:0%"></div></div><div class="vote-count" id="vc-1">0 votes</div></div></div>
      </button>
      <button class="opt-btn" id="opt-2" onclick="hostPick(2)">
        <span class="opt-letter">C</span>
        <div style="flex:1"><div class="opt-text" id="opt-text-2"></div><div class="vote-bar-wrap"><div class="vote-bar-bg"><div class="vote-bar-fill" id="bar-2" style="width:0%"></div></div><div class="vote-count" id="vc-2">0 votes</div></div></div>
      </button>
      <button class="opt-btn" id="opt-3" onclick="hostPick(3)">
        <span class="opt-letter">D</span>
        <div style="flex:1"><div class="opt-text" id="opt-text-3"></div><div class="vote-bar-wrap"><div class="vote-bar-bg"><div class="vote-bar-fill" id="bar-3" style="width:0%"></div></div><div class="vote-count" id="vc-3">0 votes</div></div></div>
      </button>
    </div>
  </div>

  <div id="chat-status">
    <div id="chat-hint">Chat: type <strong>A</strong>, <strong>B</strong>, <strong>C</strong>, or <strong>D</strong> to vote</div>
    <div id="timer-bar-bg"><div id="timer-bar" style="width:100%"></div></div>
    <div id="chat-timer">25</div>
  </div>

  <div id="reveal-wrap">
    <div id="reveal-answer"></div>
    <div id="reveal-detail"></div>
    <div id="reveal-winners"></div>
  </div>

  <div id="host-bar">
    <button class="hbtn hbtn-green" id="btn-reveal" onclick="revealAnswer()" disabled>🔍 Reveal Answer</button>
    <button class="hbtn hbtn-orange" id="btn-next" onclick="nextRound()" disabled>NEXT ROUND →</button>
    <button class="hbtn hbtn-grey" onclick="restartGame()">↺ Restart</button>
  </div>

  <div id="lb-wrap">
    <div id="lb-title">LEADERBOARD</div>
    <div id="lb-list"></div>
  </div>
</div>

function connectTwitch(){
  if(ws) ws.close();
  ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen = ()=>{
    ws.send('PASS oauth:x');
    ws.send('NICK justinfan'+Math.floor(Math.random()*99999));
    ws.send('JOIN #'+channel);
  };
  ws.onmessage = e=>{
    e.data.split('\r\n').forEach(raw=>{
      if(!raw)return;
      if(raw.indexOf('PING')===0){ws.send('PONG :tmi.twitch.tv');return;}
      if(raw.indexOf('366')>-1){
        setConn(true);
        document.getElementById('login-view').style.display='none';
        document.getElementById('game-view').style.display='flex';
        document.getElementById('channel-badge').textContent='twitch.tv/'+channel;
        loadRound();
        return;
      }
      if(raw.indexOf('PRIVMSG')===-1)return;
      const um=raw.match(/display-name=([^;\s]+)/);
      const mm=raw.match(/PRIVMSG #[^\s]+ :(.+)/);
      if(!um||!mm)return;
      const user=um[1].trim();
      const msg=mm[1].trim().toUpperCase();
      if(votingOpen && !voters[user] && ['A','B','C','D'].includes(msg)){
        const idx={'A':0,'B':1,'C':2,'D':3}[msg];
        voters[user]=idx;
        votes[idx]++;
        updateVoteBars();
        // Award points if correct
        if(idx === ROUNDS[roundIdx].answer){
          if(!scores[user])scores[user]=0;
          scores[user]+=1;
        }
      }
    });
  };
  ws.onclose=()=>{setConn(false);setTimeout(connectTwitch,3000);};
  ws.onerror=()=>ws.close();
}

function setConn(ok){
  document.getElementById('dot').className='dot'+(ok?' ok':'');
  document.getElementById('conn-lbl').textContent=ok?'Connected to #'+channel:'Disconnected';
  if(!ok)document.getElementById('login-err').textContent='Disconnected, reconnecting...';
}

function loadRound(){
  if(roundIdx>=ROUNDS.length){showFinalResults();return;}
  const r=ROUNDS[roundIdx];
  revealed=false;
  votes={0:0,1:0,2:0,3:0};
  voters={};
  votingOpen=false;

  document.getElementById('round-badge').textContent='ROUND '+(roundIdx+1)+' OF '+ROUNDS.length;
  document.getElementById('mugshot-img').src='data:image/webp;base64,'+IMGS[r.img];
  document.getElementById('mugshot-name').textContent=r.name.toUpperCase();

  r.options.forEach((opt,i)=>{
    document.getElementById('opt-text-'+i).textContent=opt;
    document.getElementById('opt-'+i).className='opt-btn';
    document.getElementById('bar-'+i).style.width='0%';
    document.getElementById('vc-'+i).textContent='0 votes';
  });

  document.getElementById('reveal-wrap').style.display='none';
  document.getElementById('btn-reveal').disabled=true;
  document.getElementById('btn-next').disabled=true;
  document.getElementById('lb-wrap').style.display='none';

  // Start timer
  startTimer();
}

function startTimer(){
  timerLeft=timerSecs;
  votingOpen=true;
  const bar=document.getElementById('timer-bar');
  const lbl=document.getElementById('chat-timer');
  bar.style.transition='none';bar.style.width='100%';bar.style.background='var(--orange)';
  lbl.textContent=timerLeft;
  requestAnimationFrame(()=>{
    bar.style.transition='width 1s linear,background .3s';
    timerInterval=setInterval(()=>{
      timerLeft--;lbl.textContent=timerLeft;
      bar.style.width=(timerLeft/timerSecs*100)+'%';
      if(timerLeft<=5)bar.style.background='var(--red)';
      if(timerLeft<=0){
        clearInterval(timerInterval);
        votingOpen=false;
        document.getElementById('btn-reveal').disabled=false;
        lbl.textContent='⏰';
      }
    },1000);
  });
}

function updateVoteBars(){
  const total=Math.max(1,Object.values(votes).reduce((a,b)=>a+b,0));
  for(let i=0;i<4;i++){
    const pct=Math.round((votes[i]/total)*100);
    document.getElementById('bar-'+i).style.width=pct+'%';
    document.getElementById('vc-'+i).textContent=votes[i]+' vote'+(votes[i]!==1?'s':'')+' ('+pct+'%)';
  }
  const total2=Object.keys(voters).length;
  document.getElementById('score-badge').textContent=total2+' voter'+(total2!==1?'s':'');
}

function hostPick(idx){
  // Host can manually pick the answer
  if(!revealed){
    clearInterval(timerInterval);
    votingOpen=false;
    document.getElementById('chat-timer').textContent='⏰';
    document.getElementById('btn-reveal').disabled=false;
  }
}

function revealAnswer(){
  if(revealed)return;
  revealed=true;
  const r=ROUNDS[roundIdx];
  const correct=r.answer;

  // Highlight options
  for(let i=0;i<4;i++){
    const btn=document.getElementById('opt-'+i);
    if(i===correct){btn.classList.add('revealed-correct');}
    else{btn.classList.add('loser');}
  }

  // Show reveal
  const letters=['A','B','C','D'];
  const rw=document.getElementById('reveal-wrap');
  rw.style.display='flex';
  document.getElementById('reveal-answer').textContent=letters[correct]+' — '+r.options[correct];
  document.getElementById('reveal-detail').textContent=r.reveal;

  // Who got it right
  const winners=Object.entries(voters).filter(([u,v])=>v===correct).map(([u])=>u);
  document.getElementById('reveal-winners').textContent=
    winners.length ? '🏆 Got it right: '+winners.slice(0,10).join(', ')+(winners.length>10?' and '+(winners.length-10)+' more':'')
    : 'Nobody got it right!';

  document.getElementById('btn-reveal').disabled=true;
  document.getElementById('btn-next').disabled=false;

  // Show leaderboard
  renderLB();
  document.getElementById('lb-wrap').style.display='block';
}

function nextRound(){
  roundIdx++;
  loadRound();
}

function restartGame(){
  roundIdx=0;scores={};loadRound();
}

function renderLB(){
  const sorted=Object.entries(scores).sort(([,a],[,b])=>b-a);
  const list=document.getElementById('lb-list');list.innerHTML='';
  sorted.slice(0,10).forEach(([u,p],i)=>{
    const r=document.createElement('div');r.className='lb-row';
    r.innerHTML='<span class="lb-rank'+(i===0?' g':'')+'">'+( i+1)+'</span><span class="lb-name">'+u+'</span><span class="lb-pts">'+p+' pts</span>';
    list.appendChild(r);
  });
}

function showFinalResults(){
  document.getElementById('round-badge').textContent='GAME OVER';
  document.getElementById('mugshot-img').src='';
  document.getElementById('mugshot-name').textContent='ALL ROUNDS DONE';
  document.getElementById('reveal-wrap').style.display='flex';
  document.getElementById('reveal-answer').textContent='Game Complete!';
  document.getElementById('reveal-detail').textContent='Thanks for playing Match the Crime!';
  renderLB();
  document.getElementById('lb-wrap').style.display='block';
  document.getElementById('btn-next').disabled=true;
}
</script>
